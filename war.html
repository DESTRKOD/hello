<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tactical Command Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Courier New', monospace; background-color: #030712; color: #f3f4f6; margin: 0; padding: 0; overflow: hidden; user-select: none; }
    canvas { display: block; touch-action: none; cursor: crosshair; border-bottom: 2px solid #1f2937; border-top: 2px solid #1f2937; }
    button { cursor: pointer; }
    .active-scale:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CITIES = {
      RU: ['Москва', 'Санкт-Петербург', 'Белгород', 'Курск', 'Ростов-на-Дону'],
      UA: ['Киев', 'Харьков', 'Львов', 'Одесса', 'Днепр']
    };

    const PVO_TYPES = {
      pickup: { id: 'pickup', name: 'ЗУ-23 Пикап', range: 75, damage: 2, fireRate: 20, reloadMax: 120, info: 'Бьет БПЛА. Средняя перезарядка.' },
      missile: { id: 'missile', name: 'ТОР-М2К', range: 135, damage: 10, fireRate: 55, reloadMax: 240, info: 'Противоракетный. Долго заряжается.' },
      buk: { id: 'buk', name: 'ЗРК БУК-М3', range: 210, damage: 45, fireRate: 110, reloadMax: 400, info: 'Тяжелый. Критическая перезарядка.' }
    };

    const ATTACK_TYPES = {
      drone: { id: 'drone', name: 'БПЛА Камикадзе', speed: 1.1, hp: 8, info: 'Медленный, пробивает спамом.', isAircraft: false },
      helicopter: { id: 'helicopter', name: 'Ударный вертолет', speed: 0.8, hp: 30, info: 'Пускает ракету при подлете.', isAircraft: true },
      plane: { id: 'plane', name: 'Истребитель Су', speed: 1.5, hp: 55, info: 'Запускает 2 штурмовые ракеты.', isAircraft: true },
      rocket: { id: 'rocket', name: 'Крылатая ракета', speed: 2.7, hp: 14, info: 'Идеально для прорыва ПВО.', isAircraft: false }
    };

    function App() {
      const [screen, setScreen] = useState('start');
      const [country, setCountry] = useState(null);
      const [role, setRole] = useState(null);
      const [city, setCity] = useState('');
      const [cityHp, setCityHp] = useState(100);
      const [score, setScore] = useState(0);
      const [selectedUnit, setSelectedUnit] = useState('pickup');
      const [logMsg, setLogMsg] = useState('Ожидание тактических координат пуска.');

      const canvasRef = useRef(null);
      const gameStateRef = useRef({ turrets: [], enemies: [], particles: [], mapLines: [], spawnTimer: 0, nextId: 1 });
      const animationRef = useRef(null);

      useEffect(() => {
        if (window.Telegram && window.Telegram.WebApp) {
          window.Telegram.WebApp.ready();
          window.Telegram.WebApp.expand();
        }
      }, []);

      const generateTacticalMap = () => {
        const lines = [];
        for(let i = 0; i < 8; i++) {
          let points = [];
          let x = Math.random() * 340 + 30;
          let y = Math.random() * 350 + 30;
          points.push({x, y});
          for(let j = 0; j < 3; j++) {
            x += (Math.random() - 0.5) * 150;
            y += (Math.random() - 0.5) * 150;
            points.push({x, y});
          }
          lines.push({ points, type: i % 2 === 0 ? 'river' : 'road' });
        }
        gameStateRef.current.mapLines = lines;
      };

      useEffect(() => {
        if (city) generateTacticalMap();
      }, [city]);

      const triggerHaptic = (type, style = 'light') => {
        try {
          if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
            if (type === 'impact') window.Telegram.WebApp.HapticFeedback.impactOccurred(style);
            else if (type === 'notification') window.Telegram.WebApp.HapticFeedback.notificationOccurred(style);
          }
        } catch (e) {}
      };

      const handleSelectCountry = (sel) => {
        triggerHaptic('impact', 'medium');
        setCountry(sel);
        const list = CITIES[sel];
        setCity(list[Math.floor(Math.random() * list.length)]);
        setScreen('role');
      };

      const handleSelectRole = (selRole) => {
        triggerHaptic('notification', 'success');
        setRole(selRole);
        setCityHp(100);
        setScore(0);
        setSelectedUnit(selRole === 'pvo' ? 'pickup' : 'drone');
        setScreen('game');
        setLogMsg(selRole === 'pvo' ? 'Кликните по карте, чтобы развернуть батареи ПВО!' : 'Кликните по карте, задавая финальные точки прилета!');
      };

      useEffect(() => {
        if (screen !== 'game' || !canvasRef.current) return;

        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const state = gameStateRef.current;

        const resizeCanvas = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight - 420;
        };
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const center = { x: canvas.width / 2, y: canvas.height / 2 };

        state.turrets = [];
        state.enemies = [];
        state.particles = [];
        state.spawnTimer = 0;
        state.nextId = 1;

        if (role === 'attack') {
          state.turrets = [
            { id: 'b1', x: center.x - 70, y: center.y - 60, ...PVO_TYPES.pickup, cooldown: 0, currentAmmo: 4, reloadTimer: 0 },
            { id: 'b2', x: center.x + 70, y: center.y + 60, ...PVO_TYPES.pickup, cooldown: 0, currentAmmo: 4, reloadTimer: 0 },
            { id: 'b3', x: center.x - 30, y: center.y + 90, ...PVO_TYPES.missile, cooldown: 0, currentAmmo: 2, reloadTimer: 0 },
            { id: 'b4', x: center.x + 50, y: center.y - 80, ...PVO_TYPES.buk, cooldown: 0, currentAmmo: 1, reloadTimer: 0 }
          ];
        }

        const gameLoop = () => {
          if (!canvas || !ctx) return;

          ctx.fillStyle = '#070a13';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          state.mapLines.forEach(line => {
            ctx.beginPath();
            ctx.moveTo(line.points[0].x, line.points[0].y);
            for(let p of line.points) ctx.lineTo(p.x, p.y);
            ctx.strokeStyle = line.type === 'river' ? 'rgba(30, 64, 175, 0.15)' : 'rgba(75, 85, 99, 0.12)';
            ctx.lineWidth = line.type === 'river' ? 3 : 1.5;
            ctx.stroke();
          });

          ctx.strokeStyle = 'rgba(31, 41, 55, 0.3)';
          ctx.lineWidth = 1;
          for(let i = 0; i < canvas.width; i += 40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
          }

          ctx.fillStyle = cityHp > 30 ? 'rgba(16, 185, 129, 0.15)' : 'rgba(239, 68, 68, 0.15)';
          ctx.beginPath(); ctx.arc(center.x, center.y, 22, 0, Math.PI * 2); ctx.fill();
          ctx.strokeStyle = cityHp > 30 ? '#10b981' : '#ef4444';
          ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(center.x, center.y, 8, 0, Math.PI * 2); ctx.stroke();
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 9px monospace';
          ctx.fillText(`ШТАБ: ${city.toUpperCase()}`, center.x - 40, center.y - 14);

          if (role === 'pvo') {
            state.spawnTimer++;
            if (state.spawnTimer % 130 === 0) {
              const keys = ['drone', 'helicopter', 'plane', 'rocket'];
              const typeKey = keys[Math.floor(Math.random() * keys.length)];
              const type = ATTACK_TYPES[typeKey];
              const angle = Math.random() * Math.PI * 2;
              state.enemies.push({
                gameId: state.nextId++,
                ...type,
                x: center.x + Math.cos(angle) * 230,
                y: center.y + Math.sin(angle) * 230,
                tx: center.x, ty: center.y,
                currentHp: type.hp,
                hasFired: false
              });
            }
          }

          for (let i = state.enemies.length - 1; i >= 0; i--) {
            const e = state.enemies[i];
            const dx = e.tx - e.x;
            const dy = e.ty - e.y;
            const dist = Math.hypot(dx, dy);

            if (e.isAircraft && dist < 140 && !e.hasFired) {
              e.hasFired = true;
              setLogMsg(`Внимание! ${e.name} произвел пуск ракеты.`);
              state.enemies.push({
                gameId: state.nextId++,
                ...ATTACK_TYPES.rocket,
                x: e.x, y: e.y,
                tx: center.x, ty: center.y,
                currentHp: ATTACK_TYPES.rocket.hp,
                hasFired: true
              });
              e.tx = e.x - Math.cos(Math.atan2(dy, dx)) * 250;
              e.ty = e.y - Math.sin(Math.atan2(dy, dx)) * 250;
              continue;
            }

            if (dist < 6) {
              if (Math.abs(e.tx - center.x) < 5 && Math.abs(e.ty - center.y) < 5) {
                const dmg = Math.ceil(e.hp / 2);
                setLogMsg(`Удар по координатам штаба! Нанесено: -${dmg} HP`);
                setCityHp(prev => Math.max(0, prev - dmg));
                triggerHaptic('notification', 'error');
                if (role === 'attack') setScore(prev => prev + 10);
              }
              state.enemies.splice(i, 1);
              continue;
            }

            e.x += (dx / dist) * e.speed;
            e.y += (dy / dist) * e.speed;

            ctx.fillStyle = role === 'pvo' ? '#ef4444' : '#3b82f6';
            ctx.beginPath(); ctx.arc(e.x, e.y, 5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.75)';
            ctx.font = '8px monospace';
            ctx.fillText(`${e.name.split(' ')[0]} [${Math.max(0, Math.ceil(e.currentHp))} HP]`, e.x + 8, e.y + 2);
          }

          state.turrets.forEach(t => {
            ctx.beginPath(); ctx.arc(t.x, t.y, t.range, 0, Math.PI * 2);
            ctx.strokeStyle = role === 'pvo' ? 'rgba(16, 185, 129, 0.04)' : 'rgba(239, 68, 68, 0.04)';
            ctx.stroke();
            ctx.fillStyle = role === 'pvo' ? '#10b981' : '#f43f5e';
            ctx.fillRect(t.x - 5, t.y - 5, 10, 10);

            if (t.currentAmmo <= 0) {
              t.reloadTimer++;
              ctx.beginPath();
              ctx.arc(t.x, t.y, 12, 0, (t.reloadTimer / t.reloadMax) * Math.PI * 2);
              ctx.strokeStyle = '#f59e0b';
              ctx.lineWidth = 1.5;
              ctx.stroke();
              if (t.reloadTimer >= t.reloadMax) {
                t.currentAmmo = t.id === 'buk' ? 1 : (t.id === 'missile' ? 2 : 4);
                t.reloadTimer = 0;
              }
              return;
            }

            t.cooldown = t.cooldown ? t.cooldown - 1 : 0;
            if (t.cooldown === 0) {
              let target = null;
              let minDist = t.range;
              state.enemies.forEach(e => {
                const d = Math.hypot(e.x - t.x, e.y - t.y);
                if (d < minDist) { minDist = d; target = e; }
              });
              if (target) {
                t.cooldown = t.fireRate;
                t.currentAmmo--;
                const isHit = Math.random() < 0.65;
                state.particles.push({
                  sx: t.x, sy: t.y,
                  tx: isHit ? target.x : target.x + (Math.random() - 0.5) * 35,
                  ty: isHit ? target.y : target.y + (Math.random() - 0.5) * 35,
                  life: 5,
                  color: isHit ? (role === 'pvo' ? '#34d399' : '#ef4444') : 'rgba(156, 163, 175, 0.3)'
                });
                if (isHit) {
                  target.currentHp -= t.damage;
                  if (target.currentHp <= 0) {
                    if (role === 'pvo') {
                      setScore(prev => prev + 1);
                      setLogMsg(`Успешный перехват цели: ${target.name}.`);
                      triggerHaptic('notification', 'success');
                    } else {
                      setLogMsg(`Вражеское ПВО перехватило юнит: ${target.name}`);
                      triggerHaptic('impact', 'heavy');
                    }
                    state.enemies = state.enemies.filter(item => item.gameId !== target.gameId);
                  } else {
                    if (role === 'pvo') triggerHaptic('impact', 'light');
                  }
                } else {
                  if (role === 'pvo') setLogMsg(`Промах комплекса ПВО по воздушной цели.`);
                }
              }
            }
          });

          for (let i = state.particles.length - 1; i >= 0; i--) {
            const p = state.particles[i];
            ctx.strokeStyle = p.color;
            ctx.lineWidth = p.life / 2;
            ctx.beginPath(); ctx.moveTo(p.sx, p.sy); ctx.lineTo(p.tx, p.ty); ctx.stroke();
            p.life--;
            if (p.life <= 0) state.particles.splice(i, 1);
          }

          animationRef.current = requestAnimationFrame(gameLoop);
        };

        gameLoop();
        return () => {
          if (animationRef.current) cancelAnimationFrame(animationRef.current);
          window.removeEventListener('resize', resizeCanvas);
        };
      }, [screen, role, city, cityHp]);

      const handleCanvasClick = (e) => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        const state = gameStateRef.current;

        if (role === 'pvo') {
          const proto = PVO_TYPES[selectedUnit];
          triggerHaptic('impact', 'heavy');
          setLogMsg(`Батарея развернута: ${proto.name}`);
          const startAmmo = proto.id === 'buk' ? 1 : (proto.id === 'missile' ? 2 : 4);
          state.turrets.push({ id: proto.id + '_' + state.nextId++, x, y, ...proto, cooldown: 0, currentAmmo: startAmmo, reloadTimer: 0 });
        } else if (role === 'attack') {
          const proto = ATTACK_TYPES[selectedUnit];
          triggerHaptic('impact', 'medium');
          setLogMsg(`Приказ принят. Запуск: ${proto.name}`);
          const side = Math.floor(Math.random() * 4);
          let sx = 0, sy = 0;
          if (side === 0) { sx = Math.random() * canvas.width; sy = -10; }
          else if (side === 1) { sx = canvas.width + 10; sy = Math.random() * canvas.height; }
          else if (side === 2) { sx = Math.random() * canvas.width; sy = canvas.height + 10; }
          else { sx = -10; sy = Math.random() * canvas.height; }
          state.enemies.push({
            gameId: state.nextId++,
            ...proto,
            x: sx, y: sy,
            tx: x, ty: y,
            currentHp: proto.hp,
            hasFired: false
          });
        }
      };

      if (screen === 'start') {
        return React.createElement('div', { className: 'flex flex-col h-screen bg-gradient-to-b from-gray-950 to-gray-900 p-6' },
          React.createElement('div', { className: 'flex-1 flex flex-col items-center justify-center gap-5' },
            React.createElement('h1', { className: 'text-2xl font-bold text-center tracking-wider text-amber-400' }, 'ГЕНШТАБ: СИМУЛЯТОР ВОЗДУШНЫХ ОПЕРАЦИЙ'),
            React.createElement('p', { className: 'text-slate-500 text-center text-xs mb-2' }, 'Тактическая панель управления ТВД'),
            React.createElement('button', { onClick: () => handleSelectCountry('RU'), className: 'w-full py-16 bg-slate-900 border-4 border-blue-600 font-black text-sm text-center flex flex-col justify-center items-center active:scale-95 transition-all duration-100 rounded-none shadow-[0_0_15px_rgba(37,99,235,0.15)] text-white' },
              React.createElement('span', { className: 'text-3xl mb-2' }, '🇷🇺'),
              React.createElement('span', { className: 'text-sm' }, 'СЕКТОР РОССИЯ')
            ),
            React.createElement('button', { onClick: () => handleSelectCountry('UA'), className: 'w-full py-16 bg-slate-900 border-4 border-amber-500 font-black text-sm text-center flex flex-col justify-center items-center active:scale-95 transition-all duration-100 rounded-none shadow-[0_0_15px_rgba(245,158,11,0.15)] text-white' },
              React.createElement('span', { className: 'text-3xl mb-2' }, '🇺🇦'),
              React.createElement('span', { className: 'text-sm' }, 'СЕКТОР УКРАИНА')
            )
          )
        );
      }

      if (screen === 'role') {
        return React.createElement('div', { className: 'flex flex-col h-screen bg-gradient-to-b from-gray-950 to-gray-900 p-6' },
          React.createElement('div', { className: 'flex-1 flex flex-col items-center justify-center gap-4' },
            React.createElement('h2', { className: 'text-xl font-bold text-white' }, `Выбран район: ${country === 'RU' ? 'РОССИЯ' : 'УКРАИНА'}`),
            React.createElement('button', { onClick: () => handleSelectRole('pvo'), className: 'w-full py-16 bg-slate-900 border-4 border-emerald-500 font-black text-xs text-center flex flex-col justify-center items-center p-3 active:scale-95 transition-all rounded-none text-white' },
              React.createElement('span', { className: 'text-4xl mb-2' }, '🛡️'),
              React.createElement('span', { className: 'text-sm font-bold' }, 'КОМАНДОВАНИЕ ПВО')
            ),
            React.createElement('button', { onClick: () => handleSelectRole('attack'), className: 'w-full py-16 bg-slate-900 border-4 border-red-500 font-black text-xs text-center flex flex-col justify-center items-center p-3 active:scale-95 transition-all rounded-none text-white' },
              React.createElement('span', { className: 'text-4xl mb-2' }, '🚀'),
              React.createElement('span', { className: 'text-sm font-bold' }, 'ОПЕРАТОР АТАК БПЛА')
            ),
            React.createElement('button', { onClick: () => setScreen('start'), className: 'text-xs text-slate-600 font-bold uppercase tracking-wider mt-2 underline' }, '◀ Сменить сектор')
          )
        );
      }

      return React.createElement('div', { className: 'flex flex-col h-screen bg-gray-950' },
        React.createElement('div', { className: 'bg-gray-900 p-3 border-b border-gray-800' },
          React.createElement('div', { className: 'flex justify-between items-center mb-2 text-xs' },
            React.createElement('span', { className: 'text-slate-400' }, `ТВД: ${city}`),
            React.createElement('span', { className: role === 'pvo' ? 'text-emerald-400' : 'text-red-400' }, role === 'pvo' ? 'ОБОРОНА' : 'НАЛЕТ'),
            React.createElement('span', { className: 'text-slate-400' }, `ОЧКИ ТВД: ${score}`),
            React.createElement('span', { className: 'text-amber-400 text-[10px]' }, 'БЕЗЛИМИТ')
          ),
          React.createElement('div', { className: 'w-full h-2 bg-slate-800 rounded-full overflow-hidden' },
            React.createElement('div', { className: `h-full ${cityHp > 30 ? 'bg-emerald-500' : 'bg-red-500'} transition-all`, style: { width: `${cityHp}%` } })
          ),
          React.createElement('div', { className: 'mt-2 p-2 bg-gray-950 border border-gray-800 text-[10px] font-mono text-slate-400' },
            React.createElement('span', { className: 'text-amber-400' }, '⚡'), ` МАРШРУТ: ${logMsg}`
          )
        ),
        React.createElement('canvas', { ref: canvasRef, onClick: handleCanvasClick, className: 'w-full flex-1', style: { touchAction: 'none' } }),
        React.createElement('div', { className: 'w-full bg-gray-900 border-t-2 border-gray-800 p-2' },
          React.createElement('div', { className: 'text-[10px] text-slate-400 font-black uppercase tracking-widest text-center border-b-2 border-gray-800 pb-1.5 mb-2' },
            role === 'pvo' ? '🛠️ КОМПЛЕКСЫ ОБОРОНЫ ШТАБА' : '📡 ДОСТУПНОЕ ВООРУЖЕНИЕ И АВИАЦИЯ'
          ),
          React.createElement('div', { className: 'grid grid-cols-2 gap-2' },
            ...(role === 'pvo' ? Object.values(PVO_TYPES).map(unit =>
              React.createElement('button', {
                key: unit.id,
                onClick: () => { triggerHaptic('impact', 'light'); setSelectedUnit(unit.id); },
                className: `p-3 rounded-none border-2 text-center flex flex-col justify-between items-center transition-all duration-150 aspect-square active:scale-95 ${selectedUnit === unit.id ? 'bg-emerald-950/60 border-emerald-500 text-white shadow-[0_0_10px_rgba(16,185,129,0.2)]' : 'bg-gray-950 border-gray-800 text-slate-400'}`
              },
                React.createElement('span', { className: 'text-xs font-black uppercase tracking-wider' }, unit.name),
                React.createElement('span', { className: 'text-[9px] text-slate-500 font-sans font-semibold leading-tight my-1' }, unit.info),
                React.createElement('span', { className: 'text-[10px] font-black text-emerald-400 font-mono tracking-widest uppercase' }, 'ДОСТУПНО')
              )
            ) : Object.values(ATTACK_TYPES).map(unit =>
              React.createElement('button', {
                key: unit.id,
                onClick: () => { triggerHaptic('impact', 'light'); setSelectedUnit(unit.id); },
                className: `p-3 rounded-none border-2 text-center flex flex-col justify-between items-center transition-all duration-150 aspect-square active:scale-95 ${selectedUnit === unit.id ? 'bg-red-950/40 border-red-500 text-white shadow-[0_0_10px_rgba(239,68,68,0.2)]' : 'bg-gray-950 border-gray-800 text-slate-400'}`
              },
                React.createElement('span', { className: 'text-xs font-black uppercase tracking-wider' }, unit.name),
                React.createElement('span', { className: 'text-[9px] text-slate-500 font-sans font-semibold leading-tight my-1' }, unit.info),
                React.createElement('span', { className: 'text-[10px] font-black text-red-400 font-mono tracking-widest uppercase' }, 'ГОТОВ')
              )
            ))
          ),
          React.createElement('div', { className: 'w-full flex justify-center mt-2' },
            React.createElement('button', { onClick: () => { triggerHaptic('impact', 'medium'); setScreen('role'); }, className: 'w-full py-4 bg-gray-900 border-2 border-gray-700 text-slate-300 text-xs font-black tracking-widest uppercase rounded-none hover:bg-gray-800 active:scale-95 transition-all' }, '◀ ВЕРНУТЬСЯ В ШТАБ СЕКТОРА')
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
