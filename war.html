<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HQ Tactical Command Simulator</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Courier New', monospace; background-color: #030712; color: #f3f4f6; margin: 0; padding: 0; overflow: hidden; user-select: none; }
    canvas { display: block; touch-action: none; cursor: crosshair; border-bottom: 2px solid #1f2937; border-top: 2px solid #1f2937; }
    button { cursor: pointer; }
    .active-scale:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CITIES = {
      RU: ['Москва', 'Белгород'],
      UA: ['Киев', 'Харьков']
    };

    const PVO_TYPES = {
      pickup: { id: 'pickup', name: 'ЗУ-23 Пикап', range: 70, minRange: 0, damage: 2, fireRate: 15, reloadMax: 100, maxHp: 30, info: 'Эффективен против БПЛА. Нет мертвой зоны.' },
      missile: { id: 'missile', name: 'ТОР-М2К', range: 130, minRange: 20, damage: 10, fireRate: 50, reloadMax: 200, maxHp: 50, info: 'Противоракетный. Малая мертвая зона.' },
      buk: { id: 'buk', name: 'ЗРК БУК-М3', range: 200, minRange: 50, damage: 40, fireRate: 100, reloadMax: 350, maxHp: 80, info: 'Тяжелый. Большая мертвая зона!' }
    };

    const ATTACK_TYPES = {
      drone: { id: 'drone', name: 'БПЛА Герань', speed: 1.0, hp: 10, damage: 15, info: 'Медленный. Идеален для перегрузки ПВО снаружи.', isAircraft: false },
      helicopter: { id: 'helicopter', name: 'Ка-52 / Ми-24', speed: 0.7, hp: 35, damage: 25, info: 'Ударный вертолет. Выпускает ракету.', isAircraft: true },
      plane: { id: 'plane', name: 'Су-35 / F-16', speed: 1.4, hp: 60, damage: 40, info: 'Истребитель. Выпускает 2 ракеты на подлете.', isAircraft: true },
      rocket: { id: 'rocket', name: 'Ракета Калибр', speed: 2.6, hp: 15, damage: 35, info: 'Сверхбыстрая цель. Игнорирует пулеметы.', isAircraft: false }
    };

    function App() {
      const [screen, setScreen] = useState('start');
      const [country, setCountry] = useState(null);
      const [role, setRole] = useState(null);
      const [city, setCity] = useState('');
      const [cityHp, setCityHp] = useState(100);
      const [score, setScore] = useState(0);
      const [selectedUnit, setSelectedUnit] = useState('pickup');
      const [logMsg, setLogMsg] = useState('ЦУ: Выберите сектор боевого дежурства.');

      const canvasRef = useRef(null);
      const gameStateRef = useRef({ turrets: [], enemies: [], particles: [], explosions: [], mapData: {}, nextId: 1 });
      const animationRef = useRef(null);

      useEffect(() => {
        if (window.Telegram && window.Telegram.WebApp) {
          window.Telegram.WebApp.ready();
          window.Telegram.WebApp.expand();
        }
      }, []);

      const generateCityMap = (selectedCity) => {
        const center = { x: 170, y: 160 };
        const data = {
          city: selectedCity,
          rivers: [],
          roads: [],
          targets: [
            { id: 'bunk', name: 'БУНКЕР КП', x: center.x, y: center.y, hp: 100, maxHp: 100, desc: 'Главный узел связи' },
            { id: 'tec', name: 'ГОРОДСКАЯ ТЭЦ', x: center.x - 45, y: center.y + 40, hp: 80, maxHp: 80, desc: 'Энергоснабжение' },
            { id: 'air', name: 'ВОЕННЫЙ АЭРОДРОМ', x: center.x + 55, y: center.y - 45, hp: 80, maxHp: 80, desc: 'Взлетная полоса' }
          ]
        };

        if (selectedCity === 'Киев') {
          data.rivers.push({ points: [{x: 180, y: 0}, {x: 175, y: 80}, {x: 160, y: 160}, {x: 190, y: 240}, {x: 185, y: 320}] });
          data.roads.push({ points: [{x: 0, y: 150}, {x: 340, y: 170}] });
        } else if (selectedCity === 'Москва') {
          data.roads.push({ isCircle: true, cx: center.x, cy: center.y, r: 110 });
          data.rivers.push({ points: [{x: 0, y: 220}, {x: 100, y: 200}, {x: 170, y: 175}, {x: 230, y: 140}, {x: 340, y: 150}] });
        } else {
          data.roads.push({ points: [{x: 0, y: 0}, {x: 340, y: 320}] });
          data.roads.push({ points: [{x: 340, y: 0}, {x: 0, y: 320}] });
        }

        gameStateRef.current.mapData = data;
      };

      const triggerHaptic = (type, style = 'light') => {
        try {
          if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
            if (type === 'impact') window.Telegram.WebApp.HapticFeedback.impactOccurred(style);
            else if (type === 'notification') window.Telegram.WebApp.HapticFeedback.notificationOccurred(style);
          }
        } catch (e) {}
      };

      const handleSelectCountry = (sel) => {
        triggerHaptic('impact', 'medium');
        setCountry(sel);
        const list = CITIES[sel];
        const picked = list[Math.floor(Math.random() * list.length)];
        setCity(picked);
        generateCityMap(picked);
        setScreen('role');
      };

      const handleSelectRole = (selRole) => {
        triggerHaptic('notification', 'success');
        setRole(selRole);
        setScore(0);
        setSelectedUnit(selRole === 'pvo' ? 'pickup' : 'drone');
        
        if (gameStateRef.current.mapData.targets) {
          gameStateRef.current.mapData.targets.forEach(t => t.hp = t.maxHp);
        }
        setCityHp(100);
        setScreen('game');
        setLogMsg(selRole === 'pvo' ? 'Установите ПВО в секторах для защиты объектов инфраструктуры!' : 'Кликните по вражеским объектам (ТЭЦ, Аэродром, Бункер) для налета!');
      };

      useEffect(() => {
        if (screen !== 'game' || !canvasRef.current) return;

        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const state = gameStateRef.current;

        const resizeCanvas = () => {
          canvas.width = 340;
          canvas.height = 320;
        };
        resizeCanvas();

        state.turrets = [];
        state.enemies = [];
        state.particles = [];
        state.explosions = [];
        state.spawnTimer = 0;
        state.nextId = 1;

        if (role === 'attack') {
          state.turrets = [
            { id: 'b1', x: 130, y: 120, ...PVO_TYPES.pickup, cooldown: 0, currentAmmo: 4, reloadTimer: 0, hp: 30, maxHp: 30 },
            { id: 'b2', x: 210, y: 200, ...PVO_TYPES.pickup, cooldown: 0, currentAmmo: 4, reloadTimer: 0, hp: 30, maxHp: 30 },
            { id: 'b3', x: 110, y: 210, ...PVO_TYPES.missile, cooldown: 0, currentAmmo: 2, reloadTimer: 0, hp: 50, maxHp: 50 },
            { id: 'b4', x: 230, y: 100, ...PVO_TYPES.buk, cooldown: 0, currentAmmo: 1, reloadTimer: 0, hp: 80, maxHp: 80 }
          ];
        }

        const gameLoop = () => {
          if (!canvas || !ctx) return;

          ctx.fillStyle = '#060913';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          const map = state.mapData;

          ctx.lineWidth = 4;
          ctx.strokeStyle = 'rgba(29, 78, 216, 0.25)';
          map.rivers?.forEach(r => {
            ctx.beginPath();
            ctx.moveTo(r.points[0].x, r.points[0].y);
            r.points.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();
          });

          ctx.lineWidth = 1.5;
          ctx.strokeStyle = 'rgba(75, 85, 99, 0.25)';
          map.roads?.forEach(road => {
            ctx.beginPath();
            if (road.isCircle) {
              ctx.arc(road.cx, road.cy, road.r, 0, Math.PI * 2);
            } else {
              ctx.moveTo(road.points[0].x, road.points[0].y);
              road.points.forEach(p => ctx.lineTo(p.x, p.y));
            }
            ctx.stroke();
          });

          ctx.strokeStyle = 'rgba(31, 41, 55, 0.4)';
          ctx.lineWidth = 1;
          for(let i = 40; i < canvas.width; i += 40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
          }

          let aliveTargetsCount = 0;
          let totalCurrentHp = 0;
          let totalMaxHp = 0;

          map.targets?.forEach(t => {
            totalMaxHp += t.maxHp;
            totalCurrentHp += t.hp;

            if (t.hp <= 0) {
              ctx.fillStyle = '#1e293b';
              ctx.fillRect(t.x - 7, t.y - 7, 14, 14);
              ctx.strokeStyle = '#475569';
              ctx.strokeRect(t.x - 7, t.y - 7, 14, 14);
              ctx.fillStyle = '#64748b';
              ctx.font = '7px monospace';
              ctx.fillText('[УНИЧТОЖЕН]', t.x - 22, t.y - 12);
              return;
            }

            aliveTargetsCount++;
            ctx.fillStyle = 'rgba(245, 158, 11, 0.08)';
            ctx.beginPath(); ctx.arc(t.x, t.y, 16, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = t.id === 'bunk' ? '#ef4444' : '#f59e0b';
            ctx.fillRect(t.x - 6, t.y - 6, 12, 12);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 7px monospace';
            ctx.fillText(t.name, t.x - 20, t.y - 12);
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(t.x - 15, t.y + 10, 30, 3);
            ctx.fillStyle = t.hp > t.maxHp * 0.4 ? '#10b981' : '#f43f5e';
            ctx.fillRect(t.x - 15, t.y + 10, (t.hp / t.maxHp) * 30, 3);
          });

          const currentHpPercent = totalMaxHp > 0 ? Math.ceil((totalCurrentHp / totalMaxHp) * 100) : 0;
          if (currentHpPercent !== cityHp) setCityHp(currentHpPercent);
          
          if (aliveTargetsCount === 0) {
            alert(`Критическая ошибка! Вся инфраструктура сектора ${city} стерта с лица земли.`);
            setScreen('role');
            return;
          }

          if (role === 'pvo') {
            state.spawnTimer++;
            if (state.spawnTimer % 120 === 0) {
              const keys = ['drone', 'helicopter', 'plane', 'rocket'];
              const typeKey = keys[Math.floor(Math.random() * keys.length)];
              const type = ATTACK_TYPES[typeKey];
              const angle = Math.random() * Math.PI * 2;
              const liveTargets = map.targets.filter(t => t.hp > 0);
              if (liveTargets.length > 0) {
                const targetObj = liveTargets[Math.floor(Math.random() * liveTargets.length)];
                state.enemies.push({
                  gameId: state.nextId++,
                  ...type,
                  x: 170 + Math.cos(angle) * 230,
                  y: 160 + Math.sin(angle) * 230,
                  tx: targetObj.x, ty: targetObj.y, targetId: targetObj.id,
                  currentHp: type.hp,
                  hasFired: false
                });
              }
            }
          }

          for (let i = state.enemies.length - 1; i >= 0; i--) {
            const e = state.enemies[i];
            const dx = e.tx - e.x;
            const dy = e.ty - e.y;
            const dist = Math.hypot(dx, dy);

            if (e.isAircraft && dist < 130 && !e.hasFired) {
              e.hasFired = true;
              setLogMsg(`🚨 ПРЕДУПРЕЖДЕНИЕ: ${e.name} произвел тактический пуск ракеты!`);
              state.enemies.push({
                gameId: state.nextId++,
                ...ATTACK_TYPES.rocket,
                x: e.x, y: e.y,
                tx: e.tx, ty: e.ty, targetId: e.targetId,
                currentHp: ATTACK_TYPES.rocket.hp,
                hasFired: true
              });
              e.tx = e.x - Math.cos(Math.atan2(dy, dx)) * 260;
              e.ty = e.y - Math.sin(Math.atan2(dy, dx)) * 260;
              e.targetId = null;
              continue;
            }

            if (dist < 5) {
              if (e.targetId) {
                const targetObj = map.targets.find(t => t.id === e.targetId);
                if (targetObj && targetObj.hp > 0) {
                  targetObj.hp = Math.max(0, targetObj.hp - e.damage);
                  setLogMsg(`💥 ФИКСИРОВАН УДАР ПО: ${targetObj.name}! Прочность снижена.`);
                  state.explosions.push({ x: targetObj.x, y: targetObj.y, radius: 20, maxRadius: 25, life: 15 });
                  triggerHaptic('notification', 'error');
                  if (role === 'attack') setScore(prev => prev + 15);
                }
              }
              state.enemies.splice(i, 1);
              continue;
            }

            e.x += (dx / dist) * e.speed;
            e.y += (dy / dist) * e.speed;

            ctx.fillStyle = role === 'pvo' ? '#f87171' : '#3b82f6';
            ctx.beginPath(); ctx.arc(e.x, e.y, 5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.font = '7px monospace';
            ctx.fillText(`${e.name.split(' ')[0]} [${Math.ceil(e.currentHp)}HP]`, e.x + 7, e.y + 2);
          }

          for (let k = state.turrets.length - 1; k >= 0; k--) {
            const t = state.turrets[k];
            if (t.hp <= 0) {
              setLogMsg(`❌ Оборонительный комплекс ПВО [${t.name}] полностью уничтожен!`);
              state.explosions.push({ x: t.x, y: t.y, radius: 15, maxRadius: 20, life: 12 });
              state.turrets.splice(k, 1);
              continue;
            }

            ctx.beginPath(); ctx.arc(t.x, t.y, t.range, 0, Math.PI * 2);
            ctx.strokeStyle = role === 'pvo' ? 'rgba(16, 185, 129, 0.04)' : 'rgba(239, 68, 68, 0.05)';
            ctx.stroke();

            if (t.minRange > 0) {
              ctx.beginPath(); ctx.arc(t.x, t.y, t.minRange, 0, Math.PI * 2);
              ctx.strokeStyle = 'rgba(239, 68, 68, 0.08)';
              ctx.stroke();
            }

            ctx.fillStyle = role === 'pvo' ? '#10b981' : '#ef4444';
            ctx.fillRect(t.x - 5, t.y - 5, 10, 10);
            ctx.font = 'bold 6.5px monospace';
            ctx.fillText(`${t.name.split(' ')[0]} [${t.hp}HP]`, t.x - 20, t.y - 9);

            if (t.currentAmmo <= 0) {
              t.reloadTimer++;
              ctx.beginPath();
              ctx.arc(t.x, t.y, 11, 0, (t.reloadTimer / t.reloadMax) * Math.PI * 2);
              ctx.strokeStyle = '#f59e0b';
              ctx.lineWidth = 1.5;
              ctx.stroke();
              if (t.reloadTimer >= t.reloadMax) {
                t.currentAmmo = t.id === 'buk' ? 1 : (t.id === 'missile' ? 2 : 4);
                t.reloadTimer = 0;
              }
              continue;
            }

            t.cooldown = t.cooldown ? t.cooldown - 1 : 0;
            if (t.cooldown === 0) {
              let target = null;
              let minDist = t.range;
              state.enemies.forEach(e => {
                const d = Math.hypot(e.x - t.x, e.y - t.y);
                if (d < minDist && d >= t.minRange) {
                  minDist = d;
                  target = e;
                }
              });
              if (target) {
                t.cooldown = t.fireRate;
                t.currentAmmo--;
                const isHit = Math.random() < 0.65;
                const tx = isHit ? target.x : target.x + (Math.random() - 0.5) * 40;
                const ty = isHit ? target.y : target.y + (Math.random() - 0.5) * 40;
                state.particles.push({
                  sx: t.x, sy: t.y, tx, ty, life: 4,
                  color: isHit ? (role === 'pvo' ? '#34d399' : '#f87171') : 'rgba(156, 163, 175, 0.2)'
                });
                if (isHit) {
                  target.currentHp -= t.damage;
                  if (target.currentHp <= 0) {
                    state.explosions.push({ x: target.x, y: target.y, radius: 8, maxRadius: 14, life: 8 });
                    if (role === 'pvo') {
                      setScore(prev => prev + 1);
                      setLogMsg(`🎯 ПЕРЕХВАТ: Уничтожен ${target.name}.`);
                      triggerHaptic('notification', 'success');
                    } else {
                      setLogMsg(`💥 ПОТЕРЯ: Вражеское ПВО перехватило наш юнит.`);
                      triggerHaptic('impact', 'medium');
                    }
                    state.enemies = state.enemies.filter(item => item.gameId !== target.gameId);
                  } else {
                    if (role === 'pvo') triggerHaptic('impact', 'light');
                  }
                }
              }
            }
          }

          for (let i = state.particles.length - 1; i >= 0; i--) {
            const p = state.particles[i];
            ctx.strokeStyle = p.color;
            ctx.lineWidth = p.life / 1.5;
            ctx.beginPath(); ctx.moveTo(p.sx, p.sy); ctx.lineTo(p.tx, p.ty); ctx.stroke();
            p.life--;
            if (p.life <= 0) state.particles.splice(i, 1);
          }

          for (let i = state.explosions.length - 1; i >= 0; i--) {
            const exp = state.explosions[i];
            ctx.beginPath(); ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(239, 68, 68, ${exp.life / 15})`;
            ctx.fill();
            ctx.strokeStyle = `rgba(245, 158, 11, ${exp.life / 15})`;
            ctx.lineWidth = 1.5;
            ctx.stroke();
            exp.radius += (exp.maxRadius - exp.radius) * 0.1;
            exp.life--;
            if (exp.life <= 0) state.explosions.splice(i, 1);
          }

          animationRef.current = requestAnimationFrame(gameLoop);
        };

        gameLoop();
        return () => {
          if (animationRef.current) cancelAnimationFrame(animationRef.current);
        };
      }, [screen, role, city, cityHp]);

      const handleCanvasClick = (e) => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        const state = gameStateRef.current;

        if (role === 'pvo') {
          const proto = PVO_TYPES[selectedUnit];
          triggerHaptic('impact', 'heavy');
          setLogMsg(`Позиция ПВО развернута: ${proto.name}`);
          const startAmmo = proto.id === 'buk' ? 1 : (proto.id === 'missile' ? 2 : 4);
          state.turrets.push({ id: proto.id + '_' + state.nextId++, x, y, ...proto, cooldown: 0, currentAmmo: startAmmo, reloadTimer: 0, hp: proto.maxHp });
        } else if (role === 'attack') {
          const proto = ATTACK_TYPES[selectedUnit];
          let finalTx = x;
          let finalTy = y;
          let chosenTargetId = null;

          state.mapData.targets.forEach(t => {
            if (Math.hypot(t.x - x, t.y - y) < 22 && t.hp > 0) {
              finalTx = t.x;
              finalTy = t.y;
              chosenTargetId = t.id;
            }
          });

          state.turrets.forEach(tur => {
            if (Math.hypot(tur.x - x, tur.y - y) < 18) {
              finalTx = tur.x;
              finalTy = tur.y;
              chosenTargetId = null;
            }
          });

          triggerHaptic('impact', 'medium');
          setLogMsg(`Маршрут утвержден. Налет группы: ${proto.name}`);
          const angle = Math.random() * Math.PI * 2;
          state.enemies.push({
            gameId: state.nextId++,
            ...proto,
            x: 170 + Math.cos(angle) * 220,
            y: 160 + Math.sin(angle) * 220,
            tx: finalTx, ty: finalTy, targetId: chosenTargetId,
            currentHp: proto.hp,
            hasFired: false
          });
        }
      };

      if (screen === 'start') {
        return React.createElement('div', { className: 'flex flex-col h-screen bg-gradient-to-b from-gray-950 to-gray-900 p-6' },
          React.createElement('div', { className: 'flex-1 flex flex-col items-center justify-center gap-5' },
            React.createElement('h1', { className: 'text-2xl font-bold text-center tracking-wider text-amber-400' }, 'ГЕНШТАБ: ТАКТИЧЕСКИЙ КОМАНДНЫЙ ПУЛЬТ'),
            React.createElement('p', { className: 'text-slate-500 text-center text-xs mb-2' }, 'Выбор оперативного сектора ведения боевых действий'),
            React.createElement('button', { onClick: () => handleSelectCountry('RU'), className: 'w-full py-16 bg-slate-900 border-4 border-blue-600 font-black text-xs text-center flex flex-col justify-center items-center active:scale-95 transition-all duration-100 rounded-none shadow-[0_0_15px_rgba(37,99,235,0.15)] text-white' },
              React.createElement('span', { className: 'text-3xl mb-2' }, '🇷🇺'),
              React.createElement('span', { className: 'text-sm' }, 'РАЙОН РОССИЯ')
            ),
            React.createElement('button', { onClick: () => handleSelectCountry('UA'), className: 'w-full py-16 bg-slate-900 border-4 border-amber-500 font-black text-xs text-center flex flex-col justify-center items-center active:scale-95 transition-all duration-100 rounded-none shadow-[0_0_15px_rgba(245,158,11,0.15)] text-white' },
              React.createElement('span', { className: 'text-3xl mb-2' }, '🇺🇦'),
              React.createElement('span', { className: 'text-sm' }, 'РАЙОН УКРАИНА')
            )
          )
        );
      }

      if (screen === 'role') {
        return React.createElement('div', { className: 'flex flex-col h-screen bg-gradient-to-b from-gray-950 to-gray-900 p-6' },
          React.createElement('div', { className: 'flex-1 flex flex-col items-center justify-center gap-4' },
            React.createElement('h2', { className: 'text-xs font-black text-slate-400 uppercase tracking-widest border-b-2 border-slate-800 pb-2 w-full text-center' },
              'Выбран район: ', React.createElement('span', { className: 'text-white font-mono' }, country === 'RU' ? 'РОССИЯ' : 'УКРАИНА')
            ),
            React.createElement('div', { className: 'w-full grid grid-cols-2 gap-4 aspect-square max-w-[320px]' },
              React.createElement('button', { onClick: () => handleSelectRole('pvo'), className: 'w-full h-full bg-slate-900 border-4 border-emerald-500 font-black text-xs text-center flex flex-col justify-center items-center p-3 active:scale-95 transition-all rounded-none text-white' },
                React.createElement('span', { className: 'text-2xl mb-2' }, '🛡️'),
                React.createElement('span', { className: 'text-emerald-400 uppercase tracking-wider' }, 'КОМАНДОВАНИЕ'),
                React.createElement('span', { className: 'text-white font-bold mt-1' }, 'ПВО')
              ),
              React.createElement('button', { onClick: () => handleSelectRole('attack'), className: 'w-full h-full bg-slate-900 border-4 border-red-500 font-black text-xs text-center flex flex-col justify-center items-center p-3 active:scale-95 transition-all rounded-none text-white' },
                React.createElement('span', { className: 'text-2xl mb-2' }, '🚀'),
                React.createElement('span', { className: 'text-red-400 uppercase tracking-wider' }, 'ОПЕРАТОР'),
                React.createElement('span', { className: 'text-white font-bold mt-1' }, 'АТАК БПЛА')
              )
            ),
            React.createElement('button', { onClick: () => setScreen('start'), className: 'text-xs text-slate-600 font-bold uppercase tracking-wider mt-2 underline' }, '◀ Сменить сектор')
          )
        );
      }

      return React.createElement('div', { className: 'flex flex-col h-screen bg-gray-950' },
        React.createElement('div', { className: 'w-full bg-slate-900 border-2 border-slate-800 p-2.5 rounded-none flex justify-between items-center text-[11px] font-mono' },
          React.createElement('div', {},
            React.createElement('div', { className: 'text-slate-400' }, 'ТВД: ', React.createElement('span', { className: 'text-white font-bold' }, city)),
            React.createElement('div', { className: 'text-slate-400 mt-1' }, 'ОПЕРАЦИЯ: ', React.createElement('span', { className: role === 'pvo' ? 'text-emerald-400' : 'text-red-400' }, role === 'pvo' ? 'ОБОРОНА' : 'НАЛЕТ')),
            React.createElement('div', { className: 'text-slate-400 mt-1' }, 'УНИЧТОЖЕНО: ', React.createElement('span', { className: 'text-white font-bold' }, score))
          ),
          React.createElement('div', { className: 'text-right flex flex-col items-end' },
            React.createElement('div', { className: 'text-emerald-400 font-black text-sm tracking-widest uppercase' }, 'РЕЖИМ ИСПЫТАНИЯ'),
            React.createElement('div', { className: 'text-[9px] text-slate-500 mt-1' }, 'ЖИЗНЕСПОСОБНОСТЬ ШТАБА:'),
            React.createElement('div', { className: 'w-24 bg-slate-950 h-2 rounded-none border border-slate-800 mt-1 overflow-hidden' },
              React.createElement('div', { className: 'h-full bg-emerald-500 transition-all duration-300', style: { width: `${cityHp}%` } })
            )
          )
        ),
        React.createElement('div', { className: 'my-1.5 bg-black rounded-none border-2 border-slate-800 shadow-2xl' },
          React.createElement('canvas', { ref: canvasRef, width: 340, height: 320, onClick: handleCanvasClick, style: { touchAction: 'none' } })
        ),
        React.createElement('div', { className: 'w-full bg-slate-950 border-2 border-slate-800 px-4 py-3 text-center text-xs font-black tracking-wider rounded-none text-amber-400 min-h-[44px] flex items-center justify-center' },
          '⚡ МАРШРУТ: ', logMsg
        ),
        React.createElement('div', { className: 'w-full bg-slate-900 border-2 border-slate-800 p-2 mt-1' },
          React.createElement('div', { className: 'text-[10px] text-slate-400 font-black uppercase tracking-widest text-center border-b-2 border-slate-800 pb-1.5 mb-2' },
            role === 'pvo' ? '🛠️ СТРАТЕГИЧЕСКАЯ ОБОРОНА' : '📡 ДОСТУПНЫЕ СРЕДСТВА НАПАДЕНИЯ'
          ),
          React.createElement('div', { className: 'grid grid-cols-2 gap-2' },
            ...(role === 'pvo' ? Object.values(PVO_TYPES).map(unit =>
              React.createElement('button', {
                key: unit.id,
                onClick: () => { triggerHaptic('impact', 'light'); setSelectedUnit(unit.id); },
                className: `p-3 rounded-none border-2 text-center flex flex-col justify-between items-center transition-all duration-150 aspect-square active:scale-95 ${selectedUnit === unit.id ? 'bg-emerald-950/60 border-emerald-500 text-white shadow-[0_0_10px_rgba(16,185,129,0.2)]' : 'bg-slate-950 border-slate-800 text-slate-400'}`
              },
                React.createElement('span', { className: 'text-xs font-black uppercase tracking-wider' }, unit.name),
                React.createElement('span', { className: 'text-[9px] text-slate-500 font-sans font-semibold leading-tight my-1' }, unit.info),
                React.createElement('span', { className: 'text-[10px] font-black text-emerald-400 font-mono tracking-widest uppercase' }, 'ДОСТУПНО')
              )
            ) : Object.values(ATTACK_TYPES).map(unit =>
              React.createElement('button', {
                key: unit.id,
                onClick: () => { triggerHaptic('impact', 'light'); setSelectedUnit(unit.id); },
                className: `p-3 rounded-none border-2 text-center flex flex-col justify-between items-center transition-all duration-150 aspect-square active:scale-95 ${selectedUnit === unit.id ? 'bg-red-950/40 border-red-500 text-white shadow-[0_0_10px_rgba(239,68,68,0.2)]' : 'bg-slate-950 border-slate-800 text-slate-400'}`
              },
                React.createElement('span', { className: 'text-xs font-black uppercase tracking-wider' }, unit.name),
                React.createElement('span', { className: 'text-[9px] text-slate-500 font-sans font-semibold leading-tight my-1' }, unit.info),
                React.createElement('span', { className: 'text-[10px] font-black text-red-400 font-mono tracking-widest uppercase' }, 'ГОТОВ')
              )
            ))
          )
        ),
        React.createElement('div', { className: 'w-full flex justify-center mt-2 mb-2' },
          React.createElement('button', { onClick: () => { triggerHaptic('impact', 'medium'); setScreen('role'); }, className: 'w-full py-4 bg-slate-900 border-2 border-slate-700 text-slate-300 text-xs font-black tracking-widest uppercase rounded-none hover:bg-slate-800 active:scale-95 transition-all' }, '◀ ВЕРНУТЬСЯ В ШТАБ СЕКТОРА')
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
