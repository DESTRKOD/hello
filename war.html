<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HQ Tactical Control Room</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Courier New', monospace; background-color: #020617; color: #f8fafc; margin: 0; padding: 0; overflow: hidden; user-select: none; }
    canvas { display: block; touch-action: none; cursor: crosshair; border-bottom: 2px solid #334155; border-top: 2px solid #334155; }
    button { cursor: pointer; }
    .active-scale:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CITIES = {
      RU: ['Москва', 'Санкт-Петербург', 'Белгород', 'Курск', 'Ростов-на-Дону'],
      UA: ['Киев', 'Харьков', 'Львов', 'Одесса', 'Днепр']
    };

    const PVO_TYPES = {
      pickup: { id: 'pickup', name: 'ЗУ-23 ПИКАП', cost: 150, range: 80, damage: 2, fireRate: 25, hitChance: 0.60, reward: 40, info: 'Шанс: 60%. Быстрый.' },
      missile: { id: 'missile', name: 'ТОР-М2К', cost: 400, range: 135, damage: 12, fireRate: 65, hitChance: 0.70, reward: 120, info: 'Шанс: 70%. Средний.' },
      buk: { id: 'buk', name: 'ЗРК БУК-М3', cost: 800, range: 210, damage: 50, fireRate: 120, hitChance: 0.75, reward: 300, info: 'Шанс: 75%. Тяжелый.' }
    };

    const ATTACK_TYPES = {
      drone: { id: 'drone', name: 'БПЛА КАМИКАДЗЕ', cost: 90, speed: 1.2, hp: 8, reward: 50, info: 'Нужно 2 клика (Старт -> Цель)' },
      rocket: { id: 'rocket', name: 'КРЫЛАТАЯ РАКЕТА', cost: 220, speed: 2.8, hp: 15, reward: 100, info: 'Нужно 2 клика (Старт -> Цель)' },
      helicopter: { id: 'helicopter', name: 'ВЕРТОЛЕТ МИ', cost: 350, speed: 0.8, hp: 35, reward: 180, info: 'Нужно 4 клика (Авиа-удар)' },
      plane: { id: 'plane', name: 'ИСТРЕБИТЕЛЬ СУ', cost: 700, speed: 1.6, hp: 60, reward: 350, info: 'Нужно 4 клика (Авиа-удар)' }
    };

    function App() {
      const [screen, setScreen] = useState('start');
      const [country, setCountry] = useState(null);
      const [role, setRole] = useState(null);
      const [city, setCity] = useState('');
      const [money, setMoney] = useState(600);
      const [cityHp, setCityHp] = useState(100);
      const [score, setScore] = useState(0);
      const [selectedUnit, setSelectedUnit] = useState('pickup');
      const [logMsg, setLogMsg] = useState('Система развернута. Ожидание приказов.');
      const [attackClicks, setAttackClicks] = useState([]);

      const canvasRef = useRef(null);
      const gameStateRef = useRef({ turrets: [], enemies: [], particles: [], mapLines: [], spawnTimer: 0, nextId: 1 });
      const animationRef = useRef(null);

      useEffect(() => {
        if (window.Telegram && window.Telegram.WebApp) {
          window.Telegram.WebApp.ready();
          window.Telegram.WebApp.expand();
        }
      }, []);

      const generateTacticalMap = () => {
        const lines = [];
        for(let i = 0; i < 6; i++) {
          let points = [];
          let x = Math.random() * 340 + 30;
          let y = Math.random() * 320 + 30;
          points.push({x, y});
          for(let j = 0; j < 2; j++) {
            x += (Math.random() - 0.5) * 160;
            y += (Math.random() - 0.5) * 160;
            points.push({x, y});
          }
          lines.push({ points, type: i % 2 === 0 ? 'river' : 'road' });
        }
        gameStateRef.current.mapLines = lines;
      };

      useEffect(() => {
        if (city) generateTacticalMap();
      }, [city]);

      const triggerHaptic = (type, style = 'light') => {
        try {
          if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
            if (type === 'impact') window.Telegram.WebApp.HapticFeedback.impactOccurred(style);
            else if (type === 'notification') window.Telegram.WebApp.HapticFeedback.notificationOccurred(style);
          }
        } catch (e) {}
      };

      const handleSelectCountry = (sel) => {
        triggerHaptic('impact', 'medium');
        setCountry(sel);
        const list = CITIES[sel];
        setCity(list[Math.floor(Math.random() * list.length)]);
        setScreen('role');
      };

      const handleSelectRole = (selRole) => {
        triggerHaptic('notification', 'success');
        setRole(selRole);
        setMoney(selRole === 'pvo' ? 600 : 1200);
        setCityHp(100);
        setScore(0);
        setAttackClicks([]);
        setSelectedUnit(selRole === 'pvo' ? 'pickup' : 'drone');
        setScreen('game');
        setLogMsg(selRole === 'pvo' ? 'Установите ПВО кликом по экрану.' : 'Шаг 1: Кликните по КРАЮ КАРТЫ для выбора точки старта.');
      };

      useEffect(() => {
        if (screen !== 'game' || !canvasRef.current) return;

        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const state = gameStateRef.current;

        const resizeCanvas = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight - 380;
        };
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const center = { x: canvas.width / 2, y: canvas.height / 2 };

        state.turrets = [];
        state.enemies = [];
        state.particles = [];
        state.spawnTimer = 0;
        state.nextId = 1;

        if (role === 'attack') {
          state.turrets = [
            { id: 'b1', x: center.x - 70, y: center.y - 60, ...PVO_TYPES.pickup, cooldown: 0 },
            { id: 'b2', x: center.x + 70, y: center.y + 60, ...PVO_TYPES.pickup, cooldown: 0 },
            { id: 'b3', x: center.x - 10, y: center.y + 90, ...PVO_TYPES.missile, cooldown: 0 }
          ];
        }

        const gameLoop = () => {
          if (!canvas || !ctx) return;

          ctx.fillStyle = '#020617';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          state.mapLines.forEach(line => {
            ctx.beginPath();
            ctx.moveTo(line.points[0].x, line.points[0].y);
            for(let p of line.points) ctx.lineTo(p.x, p.y);
            ctx.strokeStyle = line.type === 'river' ? 'rgba(30, 41, 59, 0.5)' : 'rgba(51, 65, 85, 0.3)';
            ctx.lineWidth = line.type === 'river' ? 3 : 1.5;
            ctx.stroke();
          });

          ctx.strokeStyle = 'rgba(51, 65, 85, 0.15)';
          ctx.lineWidth = 1;
          for(let i = 0; i < canvas.width; i += 40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
          }

          ctx.fillStyle = cityHp > 30 ? 'rgba(16, 185, 129, 0.12)' : 'rgba(239, 68, 68, 0.12)';
          ctx.beginPath(); ctx.arc(center.x, center.y, 22, 0, Math.PI * 2); ctx.fill();
          ctx.strokeStyle = cityHp > 30 ? '#10b981' : '#ef4444';
          ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(center.x, center.y, 8, 0, Math.PI * 2); ctx.stroke();
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 9px monospace';
          ctx.fillText(`ЦЕНТР: ${city.toUpperCase()}`, center.x - 40, center.y - 14);

          if (role === 'pvo') {
            state.spawnTimer++;
            if (state.spawnTimer % 140 === 0) {
              const keys = ['drone', 'rocket', 'helicopter', 'plane'];
              const typeKey = keys[Math.floor(Math.random() * keys.length)];
              const type = ATTACK_TYPES[typeKey];
              const angle = Math.random() * Math.PI * 2;
              const sx = center.x + Math.cos(angle) * 230;
              const sy = center.y + Math.sin(angle) * 230;

              if (type.id === 'drone' || type.id === 'rocket') {
                state.enemies.push({
                  gameId: state.nextId++, ...type,
                  x: sx, y: sy, tx: center.x, ty: center.y,
                  currentHp: type.hp, subType: 'single'
                });
              } else {
                const fireX = center.x + Math.cos(angle) * 120;
                const fireY = center.y + Math.sin(angle) * 120;
                state.enemies.push({
                  gameId: state.nextId++, ...type,
                  x: sx, y: sy, tx: fireX, ty: fireY,
                  currentHp: type.hp, subType: 'carrier',
                  stage: 0, origAngle: angle
                });
              }
            }
          }

          for (let i = state.enemies.length - 1; i >= 0; i--) {
            const e = state.enemies[i];
            const dx = e.tx - e.x;
            const dy = e.ty - e.y;
            const dist = Math.hypot(dx, dy);

            if (role === 'pvo' && e.subType === 'carrier' && dist < 8 && e.stage === 0) {
              e.stage = 1;
              setLogMsg(`❗ БОТ: ${e.name} вошел в зону сброса ракет!`);
              state.enemies.push({
                gameId: state.nextId++, ...ATTACK_TYPES.rocket,
                x: e.x, y: e.y, tx: center.x, ty: center.y,
                currentHp: ATTACK_TYPES.rocket.hp, subType: 'single'
              });
              e.tx = center.x + Math.cos(e.origAngle) * 300;
              e.ty = center.y + Math.sin(e.origAngle) * 300;
              continue;
            }

            if (role === 'attack' && e.subType === 'player_carrier' && dist < 8 && e.stage === 0) {
              e.stage = 1;
              setLogMsg(`🚀 Запуск тактических ракет с борта авиации!`);
              state.enemies.push({
                gameId: state.nextId++, ...ATTACK_TYPES.rocket,
                x: e.x, y: e.y, tx: e.rocket1Tx, ty: e.rocket1Ty,
                currentHp: ATTACK_TYPES.rocket.hp, subType: 'single'
              });
              state.enemies.push({
                gameId: state.nextId++, ...ATTACK_TYPES.rocket,
                x: e.x, y: e.y, tx: e.rocket2Tx, ty: e.rocket2Ty,
                currentHp: ATTACK_TYPES.rocket.hp, subType: 'single'
              });
              e.tx = -100; e.ty = -100;
              continue;
            }

            if (dist < 6) {
              if (Math.hypot(e.x - center.x, e.y - center.y) < 35) {
                const dmg = Math.ceil(e.hp / 2);
                setLogMsg(`💥 УДАР! Попадание по штабу: -${dmg} HP`);
                setCityHp(prev => {
                  const n = prev - dmg;
                  if (n <= 0) {
                    triggerHaptic('notification', 'error');
                    setScreen('role');
                    return 100;
                  }
                  triggerHaptic('notification', 'error');
                  return Math.max(0, n);
                });
                if (role === 'attack') setScore(prev => prev + 15);
              }
              state.enemies.splice(i, 1);
              continue;
            }

            e.x += (dx / dist) * e.speed;
            e.y += (dy / dist) * e.speed;

            ctx.fillStyle = role === 'pvo' ? '#ef4444' : '#3b82f6';
            ctx.beginPath(); ctx.arc(e.x, e.y, 5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.font = '8px monospace';
            ctx.fillText(`${e.name.split(' ')[0]} [${Math.max(0, Math.ceil(e.currentHp))}HP]`, e.x + 8, e.y + 2);
          }

          state.turrets.forEach(t => {
            ctx.beginPath(); ctx.arc(t.x, t.y, t.range, 0, Math.PI * 2);
            ctx.strokeStyle = role === 'pvo' ? 'rgba(16, 185, 129, 0.08)' : 'rgba(239, 68, 68, 0.08)';
            ctx.stroke();
            ctx.fillStyle = role === 'pvo' ? '#10b981' : '#ef4444';
            ctx.fillRect(t.x - 5, t.y - 5, 10, 10);
            ctx.fillStyle = '#9ca3af';
            ctx.font = '7px monospace';
            ctx.fillText(t.name.split(' ')[0], t.x - 12, t.y - 8);

            t.cooldown = t.cooldown ? t.cooldown - 1 : 0;
            if (t.cooldown === 0) {
              let target = null;
              let minDist = t.range;
              state.enemies.forEach(e => {
                const d = Math.hypot(e.x - t.x, e.y - t.y);
                if (d < minDist) { minDist = d; target = e; }
              });
              if (target) {
                t.cooldown = t.fireRate;
                state.particles.push({ sx: t.x, sy: t.y, tx: target.x, ty: target.y, life: 5, color: role === 'pvo' ? '#34d399' : '#f43f5e' });
                if (Math.random() <= t.hitChance) {
                  target.currentHp -= t.damage;
                  if (target.currentHp <= 0) {
                    if (role === 'pvo') {
                      setMoney(prev => prev + (target.reward || 40));
                      setScore(prev => prev + 1);
                      setLogMsg(`🎯 Сбита цель: ${target.name}. +${target.reward || 40}$`);
                      triggerHaptic('notification', 'success');
                    } else {
                      setLogMsg(`❌ ПВО бота ликвидировало ваш юнит: ${target.name}`);
                      triggerHaptic('impact', 'heavy');
                    }
                    state.enemies = state.enemies.filter(item => item.gameId !== target.gameId);
                  } else {
                    if (role === 'pvo') triggerHaptic('impact', 'light');
                  }
                } else {
                  setLogMsg(`📡 Разведка: Комплекс ПВО совершил ПРОМАХ по цели!`);
                }
              }
            }
          });

          for (let i = state.particles.length - 1; i >= 0; i--) {
            const p = state.particles[i];
            ctx.strokeStyle = p.color;
            ctx.lineWidth = p.life / 2;
            ctx.beginPath(); ctx.moveTo(p.sx, p.sy); ctx.lineTo(p.tx, p.ty); ctx.stroke();
            p.life--;
            if (p.life <= 0) state.particles.splice(i, 1);
          }

          animationRef.current = requestAnimationFrame(gameLoop);
        };

        gameLoop();
        return () => {
          if (animationRef.current) cancelAnimationFrame(animationRef.current);
          window.removeEventListener('resize', resizeCanvas);
        };
      }, [screen, role, city, cityHp]);

      const handleCanvasClick = (e) => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        const state = gameStateRef.current;

        if (role === 'pvo') {
          const proto = PVO_TYPES[selectedUnit];
          if (money >= proto.cost) {
            setMoney(prev => prev - proto.cost);
            triggerHaptic('impact', 'heavy');
            setLogMsg(`Развернут комплекс ПВО: ${proto.name}`);
            state.turrets.push({ id: 'u_' + state.nextId++, x, y, ...proto, cooldown: 0 });
          } else {
            triggerHaptic('notification', 'error');
            setLogMsg('❌ Недостаточно средств!');
          }
        } else if (role === 'attack') {
          const proto = ATTACK_TYPES[selectedUnit];
          if (money < proto.cost) {
            triggerHaptic('notification', 'error');
            setLogMsg('❌ Ошибка: Недостаточно средств для этой операции!');
            return;
          }

          if (attackClicks.length === 0) {
            const margin = 25;
            const isOnBorder = (x < margin || x > canvas.width - margin || y < margin || y > canvas.height - margin);
            if (!isOnBorder) {
              setLogMsg('❌ ОТКЛОНЕНО: Точка старта должна быть строго на краю (границе) карты!');
              triggerHaptic('notification', 'error');
              return;
            }
            triggerHaptic('impact', 'light');
            setAttackClicks([{x, y}]);
            if (proto.id === 'drone' || proto.id === 'rocket') {
              setLogMsg('Шаг 2: Укажите ЦЕЛЬ (куда лететь юниту).');
            } else {
              setLogMsg('Шаг 2: Укажите ТОЧКУ СБРОСА ракет на карте.');
            }
            return;
          }

          if (proto.id === 'drone' || proto.id === 'rocket') {
            const startPt = attackClicks[0];
            setMoney(prev => prev - proto.cost);
            triggerHaptic('impact', 'medium');
            setLogMsg(`🚀 Юнит ${proto.name} отправлен по маршруту.`);
            state.enemies.push({ gameId: state.nextId++, ...proto, x: startPt.x, y: startPt.y, tx: x, ty: y, currentHp: proto.hp, subType: 'single' });
            setAttackClicks([]);
            return;
          }

          if (proto.id === 'helicopter' || proto.id === 'plane') {
            if (attackClicks.length === 1) {
              triggerHaptic('impact', 'light');
              setAttackClicks([...attackClicks, {x, y}]);
              setLogMsg('Шаг 3: Укажите ЦЕЛЬ на карте для Ракеты №1.');
              return;
            }
            if (attackClicks.length === 2) {
              triggerHaptic('impact', 'light');
              setAttackClicks([...attackClicks, {x, y}]);
              setLogMsg('Шаг 4: Укажите ЦЕЛЬ на карте для Ракеты №2.');
              return;
            }
            if (attackClicks.length === 3) {
              const [startPt, firePt, r1Target] = attackClicks;
              setMoney(prev => prev - proto.cost);
              triggerHaptic('notification', 'success');
              setLogMsg(`✈ Боевая авиация вылетела на рубеж атаки.`);
              state.enemies.push({
                gameId: state.nextId++, ...proto, x: startPt.x, y: startPt.y, tx: firePt.x, ty: firePt.y,
                currentHp: proto.hp, subType: 'player_carrier', stage: 0,
                rocket1Tx: r1Target.x, rocket1Ty: r1Target.y,
                rocket2Tx: x, rocket2Ty: y
              });
              setAttackClicks([]);
              return;
            }
          }
        }
      };

      if (screen === 'start') {
        return React.createElement('div', { className: 'flex flex-col h-screen bg-gradient-to-b from-gray-950 to-gray-900 p-6' },
          React.createElement('div', { className: 'flex-1 flex flex-col items-center justify-center gap-5' },
            React.createElement('h1', { className: 'text-2xl font-bold text-center tracking-wider text-amber-400' }, 'TACTICAL COMMAND HQ'),
            React.createElement('p', { className: 'text-slate-500 text-center text-xs mb-2' }, 'Выберите оборонный сектор управления операциями'),
            React.createElement('button', { onClick: () => handleSelectCountry('RU'), className: 'w-full py-6 bg-slate-900 border-2 border-blue-600 rounded-none text-sm font-black active:bg-blue-950/40 transition text-white' }, '🇷🇺 СЕКТОР РОССИЯ'),
            React.createElement('button', { onClick: () => handleSelectCountry('UA'), className: 'w-full py-6 bg-slate-900 border-2 border-amber-500 rounded-none text-sm font-black active:bg-amber-950/40 transition text-white' }, '🇺🇦 СЕКТОР УКРАИНА')
          )
        );
      }

      if (screen === 'role') {
        return React.createElement('div', { className: 'flex flex-col h-screen bg-gradient-to-b from-gray-950 to-gray-900 p-6' },
          React.createElement('div', { className: 'flex-1 flex flex-col items-center justify-center gap-4' },
            React.createElement('h2', { className: 'text-xl font-bold text-white' }, `Выбран сектор: ${country === 'RU' ? 'РОССИЯ' : 'УКРАИНА'}`),
            React.createElement('button', { onClick: () => handleSelectRole('pvo'), className: 'w-full py-5 bg-slate-900 border-2 border-emerald-500 rounded-none font-black text-left px-5 active:bg-emerald-950/20 transition text-white' },
              React.createElement('div', { className: 'text-2xl mb-1' }, '🛡️'),
              React.createElement('div', {}, 'КОМАНДОВАНИЕ ПВО'),
              React.createElement('div', { className: 'text-xs text-slate-500 font-normal' }, 'Стройте комплексы ПВО на карте и отбивайте налеты авиации бота.')
            ),
            React.createElement('button', { onClick: () => handleSelectRole('attack'), className: 'w-full py-5 bg-slate-900 border-2 border-red-500 rounded-none font-black text-left px-5 active:bg-red-950/20 transition text-white' },
              React.createElement('div', { className: 'text-2xl mb-1' }, '🚀'),
              React.createElement('div', {}, 'ОПЕРАТОР ВОЗДУШНЫХ АТАК'),
              React.createElement('div', { className: 'text-xs text-slate-500 font-normal' }, 'Многокликовый запуск БПЛА и авиации со сбросом управляемых ракет.')
            ),
            React.createElement('button', { onClick: () => setScreen('start'), className: 'text-xs text-slate-600 underline mt-2' }, 'Вернуться назад')
          )
        );
      }

      return React.createElement('div', { className: 'flex flex-col h-screen bg-gray-950' },
        React.createElement('div', { className: 'bg-gray-900 p-3 border-b border-gray-800' },
          React.createElement('div', { className: 'flex justify-between items-center mb-2 text-xs' },
            React.createElement('span', { className: 'text-slate-400' }, `СЕКТОР: ${city}`),
            React.createElement('span', { className: role === 'pvo' ? 'text-emerald-400' : 'text-red-400' }, role === 'pvo' ? 'ОБОРОНА' : 'АТАКА'),
            React.createElement('span', { className: 'text-slate-400' }, `СБИТО: ${score}`),
            React.createElement('span', { className: 'text-amber-400 font-bold' }, `${money}$`)
          ),
          React.createElement('div', { className: 'w-full h-2 bg-slate-800 rounded-full overflow-hidden' },
            React.createElement('div', { className: `h-full ${cityHp > 30 ? 'bg-emerald-500' : 'bg-red-500'} transition-all`, style: { width: `${cityHp}%` } })
          ),
          React.createElement('div', { className: 'mt-2 p-2 bg-gray-950 border border-gray-800 text-[10px] font-mono text-slate-400' },
            React.createElement('span', { className: 'text-amber-400' }, '⚡'), ` МАРШРУТ: ${logMsg}`
          )
        ),
        React.createElement('canvas', { ref: canvasRef, onClick: handleCanvasClick, className: 'w-full flex-1', style: { touchAction: 'none' } }),
        React.createElement('div', { className: 'w-full bg-gray-900 border-t-2 border-gray-800 p-2' },
          React.createElement('div', { className: 'text-[10px] text-slate-400 font-black uppercase tracking-widest text-center border-b-2 border-gray-800 pb-1.5 mb-2' },
            role === 'pvo' ? '🛠️ КОМПЛЕКСЫ ОБОРОНЫ ШТАБА' : '📡 ДОСТУПНОЕ ВООРУЖЕНИЕ И АВИАЦИЯ'
          ),
          React.createElement('div', { className: 'grid grid-cols-2 gap-2' },
            ...(role === 'pvo' ? Object.values(PVO_TYPES).map(unit =>
              React.createElement('button', {
                key: unit.id,
                onClick: () => { triggerHaptic('impact', 'light'); setSelectedUnit(unit.id); },
                className: `p-3 rounded-none border-2 text-center flex flex-col justify-between items-center transition-all duration-150 aspect-[4/3] active:scale-95 ${selectedUnit === unit.id ? 'bg-emerald-950/60 border-emerald-500 text-white' : 'bg-gray-950 border-gray-800 text-slate-400'} ${money < unit.cost ? 'opacity-25' : ''}`
              },
                React.createElement('span', { className: 'text-xs font-black uppercase tracking-tight' }, unit.name),
                React.createElement('span', { className: 'text-[9px] text-slate-500 font-sans font-semibold leading-tight my-1' }, unit.info),
                React.createElement('span', { className: 'text-sm font-black text-yellow-400 font-mono' }, `${unit.cost}$`)
              )
            ) : Object.values(ATTACK_TYPES).map(unit =>
              React.createElement('button', {
                key: unit.id,
                onClick: () => { triggerHaptic('impact', 'light'); setSelectedUnit(unit.id); },
                className: `p-3 rounded-none border-2 text-center flex flex-col justify-between items-center transition-all duration-150 aspect-[4/3] active:scale-95 ${selectedUnit === unit.id ? 'bg-red-950/40 border-red-500 text-white' : 'bg-gray-950 border-gray-800 text-slate-400'} ${money < unit.cost ? 'opacity-25' : ''}`
              },
                React.createElement('span', { className: 'text-xs font-black uppercase tracking-tight' }, unit.name),
                React.createElement('span', { className: 'text-[9px] text-slate-500 font-sans font-semibold leading-tight my-1' }, unit.info),
                React.createElement('span', { className: 'text-sm font-black text-yellow-400 font-mono' }, `${unit.cost}$`)
              )
            ))
          ),
          React.createElement('div', { className: 'w-full flex justify-center mt-2' },
            React.createElement('button', { onClick: () => { triggerHaptic('impact', 'medium'); setScreen('role'); }, className: 'w-2/3 py-3 bg-gray-900 border-2 border-red-700/60 text-red-400 text-xs font-black tracking-widest uppercase rounded-none hover:bg-red-950/20 active:scale-95 transition-all' }, '◀ ОТМЕНИТЬ МИССИЮ')
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
