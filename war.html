<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tactical Command Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Courier New', monospace; background-color: #030712; color: #f3f4f6; margin: 0; padding: 0; overflow: hidden; user-select: none; }
    canvas { display: block; touch-action: none; cursor: crosshair; border-bottom: 4px solid #1f2937; border-top: 4px solid #1f2937; }
    button { cursor: pointer; }
    .active-scale:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CITIES = {
      RU: ['Москва', 'Санкт-Петербург', 'Белгород', 'Курск', 'Ростов-на-Дону'],
      UA: ['Киев', 'Харьков', 'Львов', 'Одесса', 'Днепр']
    };

    const PVO_TYPES = {
      pickup: { id: 'pickup', name: 'ЗУ-23 Пикап', cost: 150, range: 75, damage: 1, fireRate: 40, reloadTime: 180, info: 'Бьет БПЛА. Быстрый.' },
      missile: { id: 'missile', name: 'ТОР-М2К', cost: 400, range: 135, damage: 8, fireRate: 90, reloadTime: 300, info: 'Противоракетный.' },
      buk: { id: 'buk', name: 'ЗРК БУК-М3', cost: 800, range: 210, damage: 30, fireRate: 180, reloadTime: 420, info: 'Тяжелый радиус.' }
    };

    const ATTACK_TYPES = {
      drone: { id: 'drone', name: 'БПЛА Камикадзе', speed: 1.1, hp: 8, info: 'Медленный, дешевый.', isAircraft: false },
      helicopter: { id: 'helicopter', name: 'Ударный вертолет', speed: 0.8, hp: 30, info: 'Пускает ракету.', isAircraft: true },
      plane: { id: 'plane', name: 'Истребитель Су', speed: 1.5, hp: 55, info: 'Пускает ракету.', isAircraft: true },
      rocket: { id: 'rocket', name: 'Крылатая ракета', speed: 2.7, hp: 14, info: 'Очень быстрая цель.', isAircraft: false }
    };

    function App() {
      const [screen, setScreen] = useState('start');
      const [country, setCountry] = useState(null);
      const [role, setRole] = useState(null);
      const [city, setCity] = useState('');
      const [cityHp, setCityHp] = useState(100);
      const [score, setScore] = useState(0);
      const [selectedUnit, setSelectedUnit] = useState('pickup');
      const [logMsg, setLogMsg] = useState('Система запущена. Ждем приказа.');
      const [planStep, setPlanStep] = useState('start_pos');
      const [tempRoute, setTempRoute] = useState({ startX: 0, startY: 0, shootX: 0, shootY: 0, t1X: 0, t1Y: 0, t2X: 0, t2Y: 0 });

      const canvasRef = useRef(null);
      const gameStateRef = useRef({ turrets: [], enemies: [], particles: [], mapLines: [], spawnTimer: 0, nextId: 1 });
      const animationRef = useRef(null);

      useEffect(() => {
        if (window.Telegram && window.Telegram.WebApp) {
          window.Telegram.WebApp.ready();
          window.Telegram.WebApp.expand();
        }
      }, []);

      const generateTacticalMap = () => {
        const lines = [];
        for(let i = 0; i < 8; i++) {
          let points = [];
          let x = Math.random() * 340 + 30;
          let y = Math.random() * 320 + 30;
          points.push({x, y});
          for(let j = 0; j < 3; j++) {
            x += (Math.random() - 0.5) * 150;
            y += (Math.random() - 0.5) * 150;
            points.push({x, y});
          }
          lines.push({ points, type: i % 2 === 0 ? 'river' : 'road' });
        }
        gameStateRef.current.mapLines = lines;
      };

      useEffect(() => {
        if (city) generateTacticalMap();
      }, [city]);

      const triggerHaptic = (type, style = 'light') => {
        try {
          if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
            if (type === 'impact') window.Telegram.WebApp.HapticFeedback.impactOccurred(style);
            else if (type === 'notification') window.Telegram.WebApp.HapticFeedback.notificationOccurred(style);
          }
        } catch (e) {}
      };

      const handleSelectCountry = (sel) => {
        triggerHaptic('impact', 'medium');
        setCountry(sel);
        const list = CITIES[sel];
        setCity(list[Math.floor(Math.random() * list.length)]);
        setScreen('role');
      };

      const handleSelectRole = (selRole) => {
        triggerHaptic('notification', 'success');
        setRole(selRole);
        setCityHp(100);
        setScore(0);
        setSelectedUnit(selRole === 'pvo' ? 'pickup' : 'drone');
        setScreen('game');
        setPlanStep('start_pos');
        setLogMsg(selRole === 'pvo' ? 'Разверните ПВО для защиты штаба!' : 'Шаг 1: Выберите точку взлета юнита на краю карты');
      };

      useEffect(() => {
        if (screen !== 'game' || !canvasRef.current) return;

        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const state = gameStateRef.current;

        const resizeCanvas = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight - 420;
        };
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const center = { x: canvas.width / 2, y: canvas.height / 2 };

        state.turrets = [];
        state.enemies = [];
        state.particles = [];
        state.spawnTimer = 0;
        state.nextId = 1;

        if (role === 'attack') {
          state.turrets = [
            { id: 'b1', x: center.x - 70, y: center.y - 60, ...PVO_TYPES.pickup, cooldown: 0, ammo: 4, isReloading: false, reloadTimer: 0 },
            { id: 'b2', x: center.x + 70, y: center.y + 60, ...PVO_TYPES.pickup, cooldown: 0, ammo: 4, isReloading: false, reloadTimer: 0 },
            { id: 'b3', x: center.x - 30, y: center.y + 90, ...PVO_TYPES.missile, cooldown: 0, ammo: 2, isReloading: false, reloadTimer: 0 },
            { id: 'b4', x: center.x + 50, y: center.y - 80, ...PVO_TYPES.buk, cooldown: 0, ammo: 1, isReloading: false, reloadTimer: 0 }
          ];
        }

        const gameLoop = () => {
          if (!canvas || !ctx) return;

          ctx.fillStyle = '#070a13';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          state.mapLines.forEach(line => {
            ctx.beginPath();
            ctx.moveTo(line.points[0].x, line.points[0].y);
            for(let p of line.points) ctx.lineTo(p.x, p.y);
            ctx.strokeStyle = line.type === 'river' ? 'rgba(30, 64, 175, 0.15)' : 'rgba(75, 85, 99, 0.12)';
            ctx.lineWidth = line.type === 'river' ? 3 : 1.5;
            ctx.stroke();
          });

          ctx.strokeStyle = 'rgba(31, 41, 55, 0.3)';
          ctx.lineWidth = 1;
          for(let i = 0; i < canvas.width; i += 40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
          }

          ctx.fillStyle = cityHp > 30 ? 'rgba(16, 185, 129, 0.15)' : 'rgba(239, 68, 68, 0.15)';
          ctx.beginPath(); ctx.arc(center.x, center.y, 22, 0, Math.PI * 2); ctx.fill();
          ctx.strokeStyle = cityHp > 30 ? '#10b981' : '#ef4444';
          ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(center.x, center.y, 8, 0, Math.PI * 2); ctx.stroke();
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 9px monospace';
          ctx.fillText(`ШТАБ: ${city.toUpperCase()}`, center.x - 40, center.y - 14);

          if (role === 'pvo') {
            state.spawnTimer++;
            if (state.spawnTimer % 130 === 0) {
              const keys = ['drone', 'helicopter', 'plane', 'rocket'];
              const typeKey = keys[Math.floor(Math.random() * keys.length)];
              const type = ATTACK_TYPES[typeKey];
              const angle = Math.random() * Math.PI * 2;
              const startX = center.x + Math.cos(angle) * 230;
              const startY = center.y + Math.sin(angle) * 230;
              const shootX = center.x + Math.cos(angle) * 120;
              const shootY = center.y + Math.sin(angle) * 120;

              state.enemies.push({
                gameId: state.nextId++,
                ...type,
                x: startX, y: startY,
                tx: type.isAircraft ? shootX : center.x,
                ty: type.isAircraft ? shootY : center.y,
                currentHp: type.hp,
                step: type.isAircraft ? 'to_shoot' : 'to_target',
                t1X: center.x, t1Y: center.y,
                t2X: center.x, t2Y: center.y
              });
            }
          }

          for (let i = state.enemies.length - 1; i >= 0; i--) {
            const e = state.enemies[i];
            const dx = e.tx - e.x;
            const dy = e.ty - e.y;
            const dist = Math.hypot(dx, dy);

            if (dist < 6) {
              if (e.step === 'to_shoot') {
                setLogMsg(`⚠ ПУСК: Бот [${e.name}] выпустил ракеты!`);
                state.enemies.push({
                  gameId: state.nextId++, ...ATTACK_TYPES.rocket,
                  x: e.x, y: e.y, tx: e.t1X, ty: e.t1Y, currentHp: ATTACK_TYPES.rocket.hp, step: 'to_target'
                });
                if (e.id === 'plane') {
                  state.enemies.push({
                    gameId: state.nextId++, ...ATTACK_TYPES.rocket,
                    x: e.x, y: e.y, tx: e.t2X, ty: e.t2Y, currentHp: ATTACK_TYPES.rocket.hp, step: 'to_target'
                  });
                }
                const escapeAngle = Math.random() * Math.PI * 2;
                e.tx = e.x + Math.cos(escapeAngle) * 300;
                e.ty = e.y + Math.sin(escapeAngle) * 300;
                e.step = 'escape';
              } else if (e.step === 'to_target') {
                if (Math.hypot(e.tx - center.x, e.ty - center.y) < 15) {
                  const dmg = Math.ceil(e.hp / 2);
                  setLogMsg(`💥 УДАР! Штаб потерял: -${dmg} HP`);
                  setCityHp(prev => {
                    const n = prev - dmg;
                    if (n <= 0) {
                      triggerHaptic('notification', 'error');
                      setScreen('role');
                      return 100;
                    }
                    triggerHaptic('notification', 'error');
                    return Math.max(0, n);
                  });
                }
                state.enemies.splice(i, 1);
                continue;
              } else if (e.step === 'escape') {
                state.enemies.splice(i, 1);
                continue;
              }
              continue;
            }

            e.x += (dx / dist) * e.speed;
            e.y += (dy / dist) * e.speed;

            ctx.fillStyle = role === 'pvo' ? '#ef4444' : '#3b82f6';
            ctx.beginPath(); ctx.arc(e.x, e.y, 5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.75)';
            ctx.font = '8px monospace';
            ctx.fillText(`${e.name.split(' ')[0]} [${Math.max(0, Math.ceil(e.currentHp))} HP]`, e.x + 8, e.y + 2);
          }

          state.turrets.forEach(t => {
            ctx.beginPath(); ctx.arc(t.x, t.y, t.range, 0, Math.PI * 2);
            ctx.strokeStyle = t.isReloading ? 'rgba(239, 68, 68, 0.1)' : (role === 'pvo' ? 'rgba(16, 185, 129, 0.05)' : 'rgba(239, 68, 68, 0.05)');
            ctx.stroke();
            ctx.fillStyle = t.isReloading ? '#f59e0b' : (role === 'pvo' ? '#10b981' : '#f43f5e');
            ctx.fillRect(t.x - 5, t.y - 5, 10, 10);
            ctx.fillStyle = '#94a3b8';
            ctx.font = '7px monospace';
            
            if (t.isReloading) {
              t.reloadTimer--;
              ctx.fillText(`ПЕРЕЗАРЯДКА`, t.x - 22, t.y - 8);
              if (t.reloadTimer <= 0) {
                t.isReloading = false;
                t.ammo = t.id === 'buk' ? 1 : (t.id === 'missile' ? 2 : 4);
              }
            } else {
              ctx.fillText(`БК: ${t.ammo}`, t.x - 12, t.y - 8);
            }
            
            if (t.isReloading) return;
            
            t.cooldown = t.cooldown ? t.cooldown - 1 : 0;
            if (t.cooldown === 0) {
              let target = null;
              let minDist = t.range;
              state.enemies.forEach(e => {
                const d = Math.hypot(e.x - t.x, e.y - t.y);
                if (d < minDist) { minDist = d; target = e; }
              });
              if (target) {
                const probability = t.id === 'buk' ? 0.85 : (t.id === 'missile' ? 0.65 : 0.45);
                t.cooldown = t.fireRate;
                t.ammo--;
                if (t.ammo <= 0) {
                  t.isReloading = true;
                  t.reloadTimer = t.reloadTime;
                }
                if (Math.random() <= probability) {
                  target.currentHp -= t.damage;
                  state.particles.push({ sx: t.x, sy: t.y, tx: target.x, ty: target.y, life: 5, color: '#10b981' });
                  if (target.currentHp <= 0) {
                    if (role === 'pvo') {
                      setScore(prev => prev + 1);
                      setLogMsg(`🎯 Уничтожен: ${target.name}`);
                      triggerHaptic('notification', 'success');
                    } else {
                      setLogMsg(`❌ Вражеское ПВО сбило ваш юнит!`);
                      triggerHaptic('impact', 'heavy');
                    }
                    state.enemies = state.enemies.filter(item => item.gameId !== target.gameId);
                  } else {
                    if (role === 'pvo') triggerHaptic('impact', 'light');
                  }
                } else {
                  state.particles.push({ sx: t.x, sy: t.y, tx: target.x + (Math.random() - 0.5) * 30, ty: target.y + (Math.random() - 0.5) * 30, life: 3, color: 'rgba(255,255,255,0.3)' });
                  if (role === 'pvo') setLogMsg(`💨 Промах комплекса ПВО!`);
                }
              }
            }
          });

          for (let i = state.particles.length - 1; i >= 0; i--) {
            const p = state.particles[i];
            ctx.strokeStyle = p.color;
            ctx.lineWidth = p.life / 2;
            ctx.beginPath(); ctx.moveTo(p.sx, p.sy); ctx.lineTo(p.tx, p.ty); ctx.stroke();
            p.life--;
            if (p.life <= 0) state.particles.splice(i, 1);
          }

          animationRef.current = requestAnimationFrame(gameLoop);
        };

        gameLoop();
        return () => {
          if (animationRef.current) cancelAnimationFrame(animationRef.current);
          window.removeEventListener('resize', resizeCanvas);
        };
      }, [screen, role, city, cityHp]);

      const handleCanvasClick = (e) => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        const state = gameStateRef.current;
        const center = { x: canvas.width / 2, y: canvas.height / 2 };

        if (role === 'pvo') {
          const proto = PVO_TYPES[selectedUnit];
          triggerHaptic('impact', 'heavy');
          setLogMsg(`Развернут комплекс ПВО: ${proto.name}`);
          state.turrets.push({ 
            id: 'u_' + state.nextId++, x, y, ...proto, cooldown: 0, 
            ammo: proto.id === 'buk' ? 1 : (proto.id === 'missile' ? 2 : 4), 
            isReloading: false, reloadTimer: 0 
          });
        } else if (role === 'attack') {
          const proto = ATTACK_TYPES[selectedUnit];
          let insideAnyPvo = false;
          state.turrets.forEach(t => {
            if (Math.hypot(x - t.x, y - t.y) < t.range) insideAnyPvo = true;
          });
          if (Math.hypot(x - center.x, y - center.y) < 25 || insideAnyPvo) {
            triggerHaptic('notification', 'error');
            setLogMsg('❌ ОШИБКА: Нельзя ставить маркеры внутри зон ПВО или Штаба!');
            return;
          }
          
          if (planStep === 'start_pos') {
            const margin = 30;
            const isOnBorder = (x < margin || x > canvas.width - margin || y < margin || y > canvas.height - margin);
            if (!isOnBorder) {
              setLogMsg('❌ ОШИБКА: Точка взлета должна быть на краю карты!');
              return;
            }
            setTempRoute(prev => ({ ...prev, startX: x, startY: y }));
            triggerHaptic('impact', 'light');
            if (proto.isAircraft) {
              setPlanStep('shoot_pos');
              setLogMsg('Шаг 2: Выберите точку ПУСКА ракет авиацией');
            } else {
              setPlanStep('target_1');
              setLogMsg('Шаг 2: Выберите КОРДИНАТУ УДАРА (цель)');
            }
          } else if (planStep === 'shoot_pos') {
            setTempRoute(prev => ({ ...prev, shootX: x, shootY: y }));
            triggerHaptic('impact', 'light');
            setPlanStep('target_1');
            setLogMsg('Шаг 3: Выберите точку цели для Ракеты №1');
          } else if (planStep === 'target_1') {
            setTempRoute(prev => ({ ...prev, t1X: x, t1Y: y }));
            triggerHaptic('impact', 'light');
            if (proto.id === 'plane') {
              setPlanStep('target_2');
              setLogMsg('Шаг 4: Выберите точку цели для Ракеты №2');
            } else {
              executeAttackPlan(proto, { ...tempRoute, t1X: x, t1Y: y });
            }
          } else if (planStep === 'target_2') {
            executeAttackPlan(proto, { ...tempRoute, t2X: x, t2Y: y });
          }
        }
      };

      const executeAttackPlan = (proto, route) => {
        triggerHaptic('impact', 'medium');
        setLogMsg(`🚀 Юнит [${proto.name}] ушел на боевой маршрут!`);
        gameStateRef.current.enemies.push({
          gameId: gameStateRef.current.nextId++,
          ...proto,
          x: route.startX, y: route.startY,
          tx: proto.isAircraft ? route.shootX : route.t1X,
          ty: proto.isAircraft ? route.shootY : route.t1Y,
          currentHp: proto.hp,
          step: proto.isAircraft ? 'to_shoot' : 'to_target',
          t1X: route.t1X, t1Y: route.t1Y,
          t2X: route.t2X || route.t1X, t2Y: route.t2Y || route.t1Y
        });
        setPlanStep('start_pos');
      };

      if (screen === 'start') {
        return React.createElement('div', { className: 'flex flex-col h-screen bg-gradient-to-b from-gray-950 to-gray-900 p-6' },
          React.createElement('div', { className: 'flex-1 flex flex-col items-center justify-center gap-5' },
            React.createElement('h1', { className: 'text-2xl font-bold text-center tracking-wider text-amber-400' }, 'ГЕНШТАБ: ТАКТИЧЕСКИЙ КП'),
            React.createElement('p', { className: 'text-slate-500 text-center text-xs mb-2' }, 'Выберите сектор для развертывания операции'),
            React.createElement('button', { onClick: () => handleSelectCountry('RU'), className: 'w-full aspect-[2/1] bg-slate-900 border-4 border-blue-600 font-black text-base tracking-widest active:scale-95 transition-all duration-150 flex flex-col items-center justify-center gap-1 text-white' },
              '🇷🇺', React.createElement('span', {}, 'СЕКТОР РОССИЯ')
            ),
            React.createElement('button', { onClick: () => handleSelectCountry('UA'), className: 'w-full aspect-[2/1] bg-slate-900 border-4 border-amber-500 font-black text-base tracking-widest active:scale-95 transition-all duration-150 flex flex-col items-center justify-center gap-1 text-white' },
              '🇺🇦', React.createElement('span', {}, 'СЕКТОР УКРАИНА')
            )
          )
        );
      }

      if (screen === 'role') {
        return React.createElement('div', { className: 'flex flex-col h-screen bg-gradient-to-b from-gray-950 to-gray-900 p-6' },
          React.createElement('div', { className: 'flex-1 flex flex-col items-center justify-center gap-4' },
            React.createElement('h2', { className: 'text-xl font-bold text-white' }, `Выбран сектор: ${country === 'RU' ? 'РОССИЯ' : 'УКРАИНА'}`),
            React.createElement('button', { onClick: () => handleSelectRole('pvo'), className: 'w-full aspect-[2/1] bg-slate-900 border-4 border-emerald-500 text-left p-6 active:scale-95 transition-all flex flex-col justify-center text-white' },
              React.createElement('span', { className: 'text-2xl mb-2' }, '🛡️'),
              React.createElement('span', { className: 'font-bold text-lg' }, 'КОМАНДОВАНИЕ ПВО'),
              React.createElement('span', { className: 'text-xs text-slate-500 font-normal' }, 'Возводите оборонительные рубежи вокруг центрального штаба. Безлимитный бюджет.')
            ),
            React.createElement('button', { onClick: () => handleSelectRole('attack'), className: 'w-full aspect-[2/1] bg-slate-900 border-4 border-red-500 text-left p-6 active:scale-95 transition-all flex flex-col justify-center text-white' },
              React.createElement('span', { className: 'text-2xl mb-2' }, '🚀'),
              React.createElement('span', { className: 'font-bold text-lg' }, 'ОПЕРАТОР ВОЗДУШНЫХ АТАК'),
              React.createElement('span', { className: 'text-xs text-slate-500 font-normal' }, 'Прокладывайте сложные пошаговые маршруты налетов БПЛА и штурмовой авиации. Накрывайте ПВО бота перегрузкой БК.')
            ),
            React.createElement('button', { onClick: () => setScreen('start'), className: 'text-xs text-slate-600 underline mt-4 font-bold uppercase tracking-wider' }, '◀ Главное меню')
          )
        );
      }

      return React.createElement('div', { className: 'flex flex-col h-screen bg-gray-950' },
        React.createElement('div', { className: 'bg-gray-900 p-3 border-b border-gray-800' },
          React.createElement('div', { className: 'flex justify-between items-center mb-2 text-xs' },
            React.createElement('span', { className: 'text-slate-400' }, `ЦЕЛЬ: ${city.toUpperCase()}`),
            React.createElement('span', { className: role === 'pvo' ? 'text-emerald-400' : 'text-red-400' }, role === 'pvo' ? 'ОБОРОНА СЕКТОРА' : 'ПРОРЫВ РУБЕЖА'),
            React.createElement('span', { className: 'text-slate-400' }, `УСПЕШНО: ${score}`)
          ),
          React.createElement('div', { className: 'w-full h-2 bg-slate-800 rounded-full overflow-hidden' },
            React.createElement('div', { className: `h-full ${cityHp > 30 ? 'bg-emerald-500' : 'bg-red-500'} transition-all`, style: { width: `${cityHp}%` } })
          ),
          React.createElement('div', { className: 'mt-2 p-2 bg-gray-950 border border-gray-800 text-[10px] font-mono text-slate-400' },
            React.createElement('span', { className: 'text-amber-400' }, '⚡'), ` МАРШРУТ: ${logMsg}`
          )
        ),
        React.createElement('canvas', { ref: canvasRef, onClick: handleCanvasClick, className: 'w-full flex-1', style: { touchAction: 'none' } }),
        React.createElement('div', { className: 'w-full bg-gray-900 border-t-2 border-gray-800 p-2' },
          React.createElement('div', { className: 'text-[10px] text-slate-400 font-black uppercase tracking-widest text-center border-b-2 border-gray-800 pb-1.5 mb-2' },
            role === 'pvo' ? '🛠️ КОМПЛЕКСЫ ОБОРОНЫ ШТАБА' : '📡 ДОСТУПНОЕ ВООРУЖЕНИЕ И АВИАЦИЯ'
          ),
          React.createElement('div', { className: 'grid grid-cols-2 gap-2' },
            ...(role === 'pvo' ? Object.values(PVO_TYPES).map(unit =>
              React.createElement('button', {
                key: unit.id,
                onClick: () => { triggerHaptic('impact', 'light'); setSelectedUnit(unit.id); },
                className: `p-3 rounded-none border-2 text-center flex flex-col justify-between items-center transition-all duration-150 aspect-square active:scale-95 ${selectedUnit === unit.id ? 'bg-emerald-950/60 border-emerald-500 text-white shadow-[0_0_10px_rgba(16,185,129,0.2)]' : 'bg-gray-950 border-gray-800 text-slate-400'}`
              },
                React.createElement('span', { className: 'text-xs font-black uppercase tracking-wider' }, unit.name),
                React.createElement('span', { className: 'text-[9px] text-slate-500 font-sans font-semibold leading-tight my-1' }, unit.info),
                React.createElement('span', { className: 'text-[10px] font-black text-emerald-400 font-mono tracking-widest uppercase' }, 'ДОСТУПНО')
              )
            ) : Object.values(ATTACK_TYPES).map(unit =>
              React.createElement('button', {
                key: unit.id,
                onClick: () => { triggerHaptic('impact', 'light'); setSelectedUnit(unit.id); },
                className: `p-3 rounded-none border-2 text-center flex flex-col justify-between items-center transition-all duration-150 aspect-square active:scale-95 ${selectedUnit === unit.id ? 'bg-red-950/40 border-red-500 text-white shadow-[0_0_10px_rgba(239,68,68,0.2)]' : 'bg-gray-950 border-gray-800 text-slate-400'}`
              },
                React.createElement('span', { className: 'text-xs font-black uppercase tracking-wider' }, unit.name),
                React.createElement('span', { className: 'text-[9px] text-slate-500 font-sans font-semibold leading-tight my-1' }, unit.info),
                React.createElement('span', { className: 'text-[10px] font-black text-red-400 font-mono tracking-widest uppercase' }, 'ГОТОВ')
              )
            ))
          ),
          React.createElement('div', { className: 'w-full flex justify-center mt-2' },
            React.createElement('button', { onClick: () => { triggerHaptic('impact', 'medium'); setScreen('role'); }, className: 'w-full py-4 bg-gray-900 border-2 border-gray-700 text-slate-300 text-xs font-black tracking-widest uppercase rounded-none hover:bg-gray-800 active:scale-95 transition-all' }, '◀ ВЕРНУТЬСЯ В ШТАБ СЕКТОРА')
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
