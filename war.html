<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tactical Command Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Courier New', monospace; background-color: #030712; color: #f3f4f6; margin: 0; padding: 0; overflow: hidden; user-select: none; }
    canvas { display: block; touch-action: none; cursor: crosshair; border-bottom: 2px solid #1f2937; border-top: 2px solid #1f2937; }
    button { cursor: pointer; }
    .active-scale:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CITIES = {
      RU: ['Москва', 'Санкт-Петербург', 'Белгород', 'Курск', 'Ростов-на-Дону'],
      UA: ['Киев', 'Харьков', 'Львов', 'Одесса', 'Днепр']
    };

    const PVO_TYPES = {
      pickup: { id: 'pickup', name: 'ЗУ-23 Пикап', cost: 150, range: 70, damage: 1, fireRate: 15, info: 'Бьет БПЛА. Быстрый.' },
      missile: { id: 'missile', name: 'ТОР-М2К', cost: 400, range: 130, damage: 8, fireRate: 60, info: 'Противоракетный.' },
      buk: { id: 'buk', name: 'ЗРК БУК-М3', cost: 800, range: 200, damage: 35, fireRate: 120, info: 'Тяжелый радиус.' }
    };

    const ATTACK_TYPES = {
      drone: { id: 'drone', name: 'БПЛА "Камикадзе"', cost: 80, speed: 1.0, hp: 6, reward: 40, info: 'Медленный, дешевый.', isAircraft: false },
      helicopter: { id: 'helicopter', name: 'Ударный вертолет', cost: 250, speed: 0.7, hp: 25, reward: 120, info: 'Пускает 1 ракету.', isAircraft: true },
      plane: { id: 'plane', name: 'Истребитель Су', cost: 600, speed: 1.5, hp: 45, reward: 300, info: 'Пускает 2 ракеты.', isAircraft: true },
      rocket: { id: 'rocket', name: 'Крылатая ракета', cost: 200, speed: 2.6, hp: 10, reward: 100, info: 'Очень быстрая цель.', isAircraft: false }
    };

    function App() {
      const [screen, setScreen] = useState('start');
      const [country, setCountry] = useState(null);
      const [role, setRole] = useState(null);
      const [city, setCity] = useState('');
      const [money, setMoney] = useState(600);
      const [cityHp, setCityHp] = useState(100);
      const [score, setScore] = useState(0);
      const [selectedUnit, setSelectedUnit] = useState('pickup');

      const canvasRef = useRef(null);
      const gameStateRef = useRef({ turrets: [], enemies: [], particles: [], mapLines: [], spawnTimer: 0 });
      const animationRef = useRef(null);

      useEffect(() => {
        if (window.Telegram && window.Telegram.WebApp) {
          window.Telegram.WebApp.ready();
          window.Telegram.WebApp.expand();
        }
      }, []);

      const generateTacticalMap = () => {
        const lines = [];
        for(let i = 0; i < 8; i++) {
          let points = [];
          let x = Math.random() * 340 + 30;
          let y = Math.random() * 360 + 30;
          points.push({x, y});
          for(let j = 0; j < 3; j++) {
            x += (Math.random() - 0.5) * 150;
            y += (Math.random() - 0.5) * 150;
            points.push({x, y});
          }
          lines.push({ points, type: i % 2 === 0 ? 'river' : 'road' });
        }
        gameStateRef.current.mapLines = lines;
      };

      useEffect(() => {
        if (city) generateTacticalMap();
      }, [city]);

      const triggerHaptic = (type, style = 'light') => {
        try {
          if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
            if (type === 'impact') window.Telegram.WebApp.HapticFeedback.impactOccurred(style);
            else if (type === 'notification') window.Telegram.WebApp.HapticFeedback.notificationOccurred(style);
          }
        } catch (e) {}
      };

      const handleSelectCountry = (sel) => {
        triggerHaptic('impact', 'medium');
        setCountry(sel);
        const list = CITIES[sel];
        setCity(list[Math.floor(Math.random() * list.length)]);
        setScreen('role');
      };

      const handleSelectRole = (selRole) => {
        triggerHaptic('notification', 'success');
        setRole(selRole);
        setMoney(selRole === 'pvo' ? 600 : 1000);
        setCityHp(100);
        setScore(0);
        setSelectedUnit(selRole === 'pvo' ? 'pickup' : 'drone');
        setScreen('game');
      };

      useEffect(() => {
        if (screen !== 'game' || !canvasRef.current) return;

        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const state = gameStateRef.current;

        const resizeCanvas = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight - 300;
        };
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const center = { x: canvas.width / 2, y: canvas.height / 2 };

        state.turrets = [];
        state.enemies = [];
        state.particles = [];
        state.spawnTimer = 0;

        if (role === 'attack') {
          state.turrets = [
            { x: center.x - 50, y: center.y - 40, ...PVO_TYPES.pickup, cooldown: 0 },
            { x: center.x + 60, y: center.y + 50, ...PVO_TYPES.pickup, cooldown: 0 },
            { x: center.x - 20, y: center.y + 70, ...PVO_TYPES.missile, cooldown: 0 },
            { x: center.x + 30, y: center.y - 80, ...PVO_TYPES.buk, cooldown: 0 }
          ];
        }

        const gameLoop = () => {
          if (!canvas || !ctx) return;

          ctx.fillStyle = '#070a13';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          state.mapLines.forEach(line => {
            ctx.beginPath();
            ctx.moveTo(line.points[0].x, line.points[0].y);
            for(let p of line.points) ctx.lineTo(p.x, p.y);
            ctx.strokeStyle = line.type === 'river' ? 'rgba(30, 64, 175, 0.3)' : 'rgba(75, 85, 99, 0.2)';
            ctx.lineWidth = line.type === 'river' ? 4 : 2;
            ctx.stroke();
          });

          ctx.strokeStyle = 'rgba(31, 41, 55, 0.4)';
          ctx.lineWidth = 1;
          for(let i = 0; i < canvas.width; i += 40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
          }

          ctx.fillStyle = cityHp > 30 ? 'rgba(16, 185, 129, 0.2)' : 'rgba(239, 68, 68, 0.2)';
          ctx.beginPath(); ctx.arc(center.x, center.y, 25, 0, Math.PI * 2); ctx.fill();
          ctx.strokeStyle = cityHp > 30 ? '#10b981' : '#ef4444';
          ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(center.x, center.y, 10, 0, Math.PI * 2); ctx.stroke();
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 10px monospace';
          ctx.fillText(`ЦЕНТР: ${city.toUpperCase()}`, center.x - 45, center.y - 15);

          if (role === 'pvo') {
            state.spawnTimer++;
            if (state.spawnTimer % 120 === 0) {
              const keys = ['drone', 'helicopter', 'plane', 'rocket'];
              const typeKey = keys[Math.floor(Math.random() * keys.length)];
              const type = ATTACK_TYPES[typeKey];
              const angle = Math.random() * Math.PI * 2;
              state.enemies.push({
                ...type,
                x: center.x + Math.cos(angle) * 240,
                y: center.y + Math.sin(angle) * 240,
                tx: center.x, ty: center.y,
                currentHp: type.hp,
                hasFired: false
              });
            }
          }

          for (let i = state.enemies.length - 1; i >= 0; i--) {
            const e = state.enemies[i];
            const dx = e.tx - e.x;
            const dy = e.ty - e.y;
            const dist = Math.hypot(dx, dy);

            if (e.isAircraft && dist < 140 && !e.hasFired) {
              e.hasFired = true;
              state.enemies.push({
                ...ATTACK_TYPES.rocket,
                x: e.x, y: e.y,
                tx: center.x, ty: center.y,
                currentHp: ATTACK_TYPES.rocket.hp,
                hasFired: true
              });
              e.tx = e.x - Math.cos(Math.atan2(dy, dx)) * 300;
              e.ty = e.y - Math.sin(Math.atan2(dy, dx)) * 300;
              continue;
            }

            if (dist < 8) {
              if (e.tx === center.x && e.ty === center.y) {
                setCityHp(prev => {
                  const n = prev - Math.ceil(e.hp / 2);
                  if (n <= 0) {
                    triggerHaptic('notification', 'error');
                    setScreen('role');
                    return 100;
                  }
                  triggerHaptic('notification', 'error');
                  return Math.max(0, n);
                });
                if (role === 'attack') setScore(prev => prev + 15);
              }
              state.enemies.splice(i, 1);
              continue;
            }

            e.x += (dx / dist) * e.speed;
            e.y += (dy / dist) * e.speed;

            ctx.fillStyle = role === 'pvo' ? '#f87171' : '#60a5fa';
            ctx.beginPath(); ctx.arc(e.x, e.y, 6, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.font = '9px monospace';
            ctx.fillText(`${e.name.split(' ')[0]}:${Math.ceil(e.currentHp)}HP`, e.x + 8, e.y + 3);
          }

          state.turrets.forEach(t => {
            ctx.beginPath(); ctx.arc(t.x, t.y, t.range, 0, Math.PI * 2);
            ctx.strokeStyle = role === 'pvo' ? 'rgba(16, 185, 129, 0.08)' : 'rgba(239, 68, 68, 0.08)';
            ctx.stroke();
            ctx.fillStyle = role === 'pvo' ? '#10b981' : '#ef4444';
            ctx.fillRect(t.x - 6, t.y - 6, 12, 12);
            ctx.fillStyle = '#9ca3af';
            ctx.font = '8px monospace';
            ctx.fillText(t.name.split(' ')[0], t.x - 15, t.y - 10);

            t.cooldown = t.cooldown ? t.cooldown - 1 : 0;
            if (t.cooldown === 0) {
              let target = null;
              let minDist = t.range;
              state.enemies.forEach(e => {
                const d = Math.hypot(e.x - t.x, e.y - t.y);
                if (d < minDist) { minDist = d; target = e; }
              });
              if (target) {
                target.currentHp -= t.damage;
                t.cooldown = t.fireRate;
                state.particles.push({ sx: t.x, sy: t.y, tx: target.x, ty: target.y, life: 6, color: role === 'pvo' ? '#34d399' : '#f87171' });
                if (target.currentHp <= 0) {
                  if (role === 'pvo') {
                    setMoney(prev => prev + (target.reward || 50));
                    setScore(prev => prev + 1);
                    triggerHaptic('notification', 'success');
                  } else {
                    triggerHaptic('impact', 'heavy');
                  }
                  state.enemies = state.enemies.filter(item => item !== target);
                } else {
                  if (role === 'pvo') triggerHaptic('impact', 'light');
                }
              }
            }
          });

          for (let i = state.particles.length - 1; i >= 0; i--) {
            const p = state.particles[i];
            ctx.strokeStyle = p.color;
            ctx.lineWidth = p.life / 2;
            ctx.beginPath(); ctx.moveTo(p.sx, p.sy); ctx.lineTo(p.tx, p.ty); ctx.stroke();
            p.life--;
            if (p.life <= 0) state.particles.splice(i, 1);
          }

          animationRef.current = requestAnimationFrame(gameLoop);
        };

        gameLoop();
        return () => {
          if (animationRef.current) cancelAnimationFrame(animationRef.current);
          window.removeEventListener('resize', resizeCanvas);
        };
      }, [screen, role, city, cityHp]);

      const handleCanvasClick = (e) => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;

        if (role === 'pvo') {
          const proto = PVO_TYPES[selectedUnit];
          if (money >= proto.cost) {
            setMoney(prev => prev - proto.cost);
            triggerHaptic('impact', 'heavy');
            gameStateRef.current.turrets.push({ x, y, ...proto, cooldown: 0 });
          } else {
            triggerHaptic('notification', 'error');
          }
        } else if (role === 'attack') {
          const proto = ATTACK_TYPES[selectedUnit];
          if (money >= proto.cost) {
            setMoney(prev => prev - proto.cost);
            triggerHaptic('impact', 'medium');
            const side = Math.floor(Math.random() * 4);
            let sx = 0, sy = 0;
            if (side === 0) { sx = Math.random() * canvas.width; sy = 0; }
            else if (side === 1) { sx = canvas.width; sy = Math.random() * canvas.height; }
            else if (side === 2) { sx = Math.random() * canvas.width; sy = canvas.height; }
            else { sx = 0; sy = Math.random() * canvas.height; }
            gameStateRef.current.enemies.push({ ...proto, x: sx, y: sy, tx: x, ty: y, currentHp: proto.hp, hasFired: false });
          } else {
            triggerHaptic('notification', 'error');
          }
        }
      };

      if (screen === 'start') {
        return React.createElement('div', { className: 'flex flex-col h-screen bg-gradient-to-b from-gray-950 to-gray-900 p-6' },
          React.createElement('div', { className: 'flex-1 flex flex-col items-center justify-center gap-5' },
            React.createElement('h1', { className: 'text-2xl font-bold text-center tracking-wider text-amber-400' }, 'ГЕНШТАБ: СИМУЛЯТОР ВОЗДУШНЫХ ОПЕРАЦИЙ'),
            React.createElement('p', { className: 'text-slate-500 text-center text-xs mb-2' }, 'Выберите сторону для развертывания тактического КП'),
            React.createElement('button', { onClick: () => handleSelectCountry('RU'), className: 'w-full py-4 bg-slate-900 border-2 border-blue-600 rounded-lg text-sm font-bold hover:bg-blue-950/30 transition active:scale-98 text-white' }, '🇷🇺 СЕКТОР РОССИЯ'),
            React.createElement('button', { onClick: () => handleSelectCountry('UA'), className: 'w-full py-4 bg-slate-900 border-2 border-amber-500 rounded-lg text-sm font-bold hover:bg-amber-950/30 transition active:scale-98 text-white' }, '🇺🇦 СЕКТОР УКРАИНА')
          )
        );
      }

      if (screen === 'role') {
        return React.createElement('div', { className: 'flex flex-col h-screen bg-gradient-to-b from-gray-950 to-gray-900 p-6' },
          React.createElement('div', { className: 'flex-1 flex flex-col items-center justify-center gap-4' },
            React.createElement('h2', { className: 'text-xl font-bold text-white' }, `Выбран сектор: ${country === 'RU' ? 'РОССИЯ' : 'УКРАИНА'}`),
            React.createElement('button', { onClick: () => handleSelectRole('pvo'), className: 'w-full py-4 bg-slate-900 border border-emerald-500 rounded-lg font-bold hover:bg-emerald-950/20 transition active:scale-95 text-left px-5 text-white' },
              React.createElement('div', { className: 'text-2xl mb-1' }, '🛡️'),
              React.createElement('div', {}, 'КОМАНДОВАНИЕ ПВО'),
              React.createElement('div', { className: 'text-xs text-slate-500 font-normal' }, 'Стройте комплексы ПВО на карте и отбивайте налеты авиации бота')
            ),
            React.createElement('button', { onClick: () => handleSelectRole('attack'), className: 'w-full py-4 bg-slate-900 border border-red-500 rounded-lg font-bold hover:bg-red-950/20 transition active:scale-95 text-left px-5 text-white' },
              React.createElement('div', { className: 'text-2xl mb-1' }, '🚀'),
              React.createElement('div', {}, 'ОПЕРАТОР ВОЗДУШНЫХ АТАК'),
              React.createElement('div', { className: 'text-xs text-slate-500 font-normal' }, 'Закупайте БПЛА и истребители, прорывая оборонительные рубежи ПВО бота')
            ),
            React.createElement('button', { onClick: () => setScreen('start'), className: 'text-xs text-slate-600 underline mt-2' }, 'В главное меню')
          )
        );
      }

      return React.createElement('div', { className: 'flex flex-col h-screen bg-gray-950' },
        React.createElement('div', { className: 'bg-gray-900 p-3 border-b border-gray-800' },
          React.createElement('div', { className: 'flex justify-between items-center mb-2 text-xs' },
            React.createElement('span', { className: 'text-slate-400' }, `СЕКТОР: ${city}`),
            React.createElement('span', { className: role === 'pvo' ? 'text-emerald-400' : 'text-red-400' }, role === 'pvo' ? 'ОБОРОНА' : 'АТАКА'),
            React.createElement('span', { className: 'text-slate-400' }, `ОЧКИ: ${score}`),
            React.createElement('span', { className: 'text-amber-400 font-bold' }, `${money}💰`)
          ),
          React.createElement('div', { className: 'w-full h-2 bg-slate-800 rounded-full overflow-hidden' },
            React.createElement('div', { className: `h-full ${cityHp > 40 ? 'bg-emerald-500' : 'bg-red-500'} transition-all`, style: { width: `${cityHp}%` } })
          )
        ),
        React.createElement('canvas', { ref: canvasRef, onClick: handleCanvasClick, className: 'w-full flex-1', style: { touchAction: 'none' } }),
        React.createElement('div', { className: 'bg-gray-900 p-3 border-t border-gray-800' },
          React.createElement('p', { className: 'text-center text-[10px] text-slate-500 mb-2' }, role === 'pvo' ? '🔧 Выберите комплекс ПВО для установки:' : '📡 Выберите юнит для пуска в точку клика:'),
          React.createElement('div', { className: 'grid grid-cols-3 gap-2 mb-2' },
            ...(role === 'pvo' ? Object.values(PVO_TYPES).map(unit =>
              React.createElement('button', {
                key: unit.id,
                onClick: () => { triggerHaptic('impact', 'light'); setSelectedUnit(unit.id); },
                className: `p-2 rounded-lg border text-left flex flex-col justify-between transition active:scale-98 ${selectedUnit === unit.id ? 'bg-emerald-950/40 border-emerald-500 text-white' : 'bg-gray-950 border-gray-800 text-slate-400'} ${money < unit.cost ? 'opacity-30' : ''}`
              },
                React.createElement('span', { className: 'text-xs font-bold' }, unit.name),
                React.createElement('span', { className: 'text-[10px] text-emerald-400' }, `${unit.cost}💰`),
                React.createElement('span', { className: 'text-[9px] text-slate-500' }, unit.info)
              )
            ) : Object.values(ATTACK_TYPES).map(unit =>
              React.createElement('button', {
                key: unit.id,
                onClick: () => { triggerHaptic('impact', 'light'); setSelectedUnit(unit.id); },
                className: `p-2 rounded-lg border text-left flex flex-col justify-between transition active:scale-98 ${selectedUnit === unit.id ? 'bg-red-950/30 border-red-500 text-white' : 'bg-gray-950 border-gray-800 text-slate-400'} ${money < unit.cost ? 'opacity-30' : ''}`
              },
                React.createElement('span', { className: 'text-xs font-bold' }, unit.name),
                React.createElement('span', { className: 'text-[10px] text-red-400' }, `${unit.cost}💰`),
                React.createElement('span', { className: 'text-[9px] text-slate-500' }, unit.info)
              )
            ))
          ),
          React.createElement('button', { onClick: () => { triggerHaptic('impact', 'medium'); setScreen('role'); }, className: 'w-full text-[10px] text-red-500/70 font-bold uppercase mt-1 tracking-widest hover:text-red-400' }, '◀ Назад в штаб')
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
