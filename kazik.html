<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чет или Нечет</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f7f9fc;
            --card-color: #ffffff;
            --text-color: #1a1c1e;
            --accent-color: #007aff;
            --shadow: 0 8px 24px rgba(149, 157, 165, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        .game-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            min-height: 500px;
        }

        .question-box {
            background: var(--card-color);
            padding: 32px 24px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
            width: 100%;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            transform: translateY(0);
            z-index: 2;
            position: relative;
        }

        .question-box.hide {
            opacity: 0;
            transform: translateY(100px);
            pointer-events: none;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        button {
            flex: 1;
            background: var(--bg-color);
            border: 2px solid transparent;
            color: var(--text-color);
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:active {
            transform: scale(0.95);
            background: #eef2f7;
        }

        .dice-area {
            position: absolute;
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            perspective: 1000px;
            display: none;
            z-index: 10;
        }

        .cube {
            width: 100px;
            height: 100px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s linear;
        }

        .face {
            position: absolute;
            width: 100px;
            height: 100px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            display: grid;
            grid-template: repeat(3, 1fr) / repeat(3, 1fr);
            padding: 10px;
            box-sizing: border-box;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
        }

        .dot {
            background-color: var(--text-color);
            border-radius: 50%;
            width: 14px;
            height: 14px;
            justify-self: center;
            align-self: center;
        }

        .front  { transform: rotateY(0deg) translateZ(50px); }
        .back   { transform: rotateY(180deg) translateZ(50px); }
        .top    { transform: rotateX(90deg) translateZ(50px); }
        .bottom { transform: rotateX(-90deg) translateZ(50px); }
        .right  { transform: rotateY(90deg) translateZ(50px); }
        .left   { transform: rotateY(-90deg) translateZ(50px); }

        .face-1 .dot:nth-child(1) { grid-area: 2 / 2; }
        
        .face-2 .dot:nth-child(1) { grid-area: 1 / 1; }
        .face-2 .dot:nth-child(2) { grid-area: 3 / 3; }
        
        .face-3 .dot:nth-child(1) { grid-area: 1 / 1; }
        .face-3 .dot:nth-child(2) { grid-area: 2 / 2; }
        .face-3 .dot:nth-child(3) { grid-area: 3 / 3; }
        
        .face-4 .dot:nth-child(1) { grid-area: 1 / 1; }
        .face-4 .dot:nth-child(2) { grid-area: 1 / 3; }
        .face-4 .dot:nth-child(3) { grid-area: 3 / 1; }
        .face-4 .dot:nth-child(4) { grid-area: 3 / 3; }
        
        .face-5 .dot:nth-child(1) { grid-area: 1 / 1; }
        .face-5 .dot:nth-child(2) { grid-area: 1 / 3; }
        .face-5 .dot:nth-child(3) { grid-area: 2 / 2; }
        .face-5 .dot:nth-child(4) { grid-area: 3 / 1; }
        .face-5 .dot:nth-child(5) { grid-area: 3 / 3; }
        
        .face-6 .dot:nth-child(1) { grid-area: 1 / 1; }
        .face-6 .dot:nth-child(2) { grid-area: 1 / 3; }
        .face-6 .dot:nth-child(3) { grid-area: 2 / 1; }
        .face-6 .dot:nth-child(4) { grid-area: 2 / 3; }
        .face-6 .dot:nth-child(5) { grid-area: 3 / 1; }
        .face-6 .dot:nth-child(6) { grid-area: 3 / 3; }

        #reset-btn {
            margin-top: 40px;
            background: var(--text-color);
            color: white;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="question-box" id="question-box">
            <h1>Чет или нечет?</h1>
            <div class="btn-group">
                <button onclick="play('even')">Чет</button>
                <button onclick="play('odd')">Нечет</button>
            </div>
        </div>

        <div class="dice-area" id="dice-area">
            <div class="cube" id="cube">
                <div class="face front face-1"><div class="dot"></div></div>
                <div class="face back face-6">
                    <div class="dot"></div><div class="dot"></div>
                    <div class="dot"></div><div class="dot"></div>
                    <div class="dot"></div><div class="dot"></div>
                </div>
                <div class="face top face-3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                <div class="face bottom face-4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                <div class="face right face-2"><div class="dot"></div><div class="dot"></div></div>
                <div class="face left face-5"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            </div>
        </div>

        <button id="reset-btn" onclick="resetGame()">Играть еще раз</button>
    </div>

    <script>
        let tg = null;
        
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
            }
        } catch(e) {
            console.log('Telegram WebApp not available');
        }

        function triggerVibration(type) {
            try {
                if (tg && tg.HapticFeedback) {
                    if (type === 'impact') tg.HapticFeedback.impactOccurred('medium');
                    if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
                    if (type === 'error') tg.HapticFeedback.notificationOccurred('error');
                }
            } catch(e) {}
        }

        const targetRotations = {
            1: { x: 0, y: 0 },
            2: { x: 0, y: -90 },
            3: { x: -90, y: 0 },
            4: { x: 90, y: 0 },
            5: { x: 0, y: 90 },
            6: { x: 0, y: 180 }
        };

        function play(userChoice) {
            triggerVibration('impact');

            const qBox = document.getElementById('question-box');
            qBox.classList.add('hide');

            const isUserWinner = Math.random() < 0.5;
            
            let finalNumber;
            if (userChoice === 'even') {
                finalNumber = isUserWinner ? [2, 4, 6][Math.floor(Math.random() * 3)] : [1, 3, 5][Math.floor(Math.random() * 3)];
            } else {
                finalNumber = isUserWinner ? [1, 3, 5][Math.floor(Math.random() * 3)] : [2, 4, 6][Math.floor(Math.random() * 3)];
            }

            const diceArea = document.getElementById('dice-area');
            const cube = document.getElementById('cube');
            
            diceArea.style.display = 'block';
            
            let progress = 0;
            let currentTop = -150;
            const targetTop = 150;
            
            cube.style.transition = 'none';
            
            const animationInterval = setInterval(() => {
                progress += 0.04;
                currentTop = -150 + (targetTop + 150) * Math.min(progress, 1);
                
                const randomX = Math.random() * 360;
                const randomY = Math.random() * 360;
                
                diceArea.style.top = currentTop + 'px';
                cube.style.transform = `rotateX(${randomX}deg) rotateY(${randomY}deg)`;

                if (progress >= 1) {
                    clearInterval(animationInterval);
                    diceArea.style.top = targetTop + 'px';
                    
                    const finalRot = targetRotations[finalNumber];
                    cube.style.transition = 'transform 0.6s cubic-bezier(0.2, 0.8, 0.3, 1)';
                    cube.style.transform = `rotateX(${finalRot.x + 720}deg) rotateY(${finalRot.y + 720}deg)`;
                    
                    setTimeout(() => {
                        triggerVibration(isUserWinner ? 'success' : 'error');
                        const resetBtn = document.getElementById('reset-btn');
                        resetBtn.style.display = 'block';
                        setTimeout(() => resetBtn.style.opacity = '1', 50);
                    }, 600);
                }
            }, 16);
        }

        function resetGame() {
            triggerVibration('impact');
            
            const qBox = document.getElementById('question-box');
            const diceArea = document.getElementById('dice-area');
            const cube = document.getElementById('cube');
            const resetBtn = document.getElementById('reset-btn');
            
            resetBtn.style.display = 'none';
            resetBtn.style.opacity = '0';
            diceArea.style.display = 'none';
            diceArea.style.top = '-150px';
            cube.style.transition = 'none';
            cube.style.transform = 'rotateX(-30deg) rotateY(45deg)';
            qBox.classList.remove('hide');
        }
    </script>
</body>
</html>
